      els.ctxCopy.addEventListener("click", () => runCommand([els.copySel, els.ctxCopy], async () => {
          els.contextMenu.classList.remove("open");
          if (state.ctxTargetImg && selectedObjects().length === 1) {
              try {
                  const blob = await extractImageBlob(state.ctxTargetImg);
                  await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
                  toast("Imagine Copiată", "Poți da Paste (Ctrl+V) în Paint/Photoshop.");
              } catch(err) {
                  console.error("Copy error:", err);
                  toast("Eroare", "Nu s-a putut copia imaginea. (" + err.message + ")", "error");
              }
          }
          await copySelected();
      }));
      
      els.ctxDelete.addEventListener("click", () => runCommand([els.deleteSel, els.ctxDelete], () => {
          els.contextMenu.classList.remove("open");
          return deleteSelected();
      }));
      
      els.ctxPaste.addEventListener("click", () => runCommand([els.pasteSel, els.ctxPaste], () => {
          els.contextMenu.classList.remove("open");
          return pasteClipboard(state.ctxTargetPos);
      }));

      const doExportImg = async () => {
          els.contextMenu.classList.remove("open");
          if (!state.ctxTargetImg) return;
          await downloadOriginalImage(state.ctxTargetImg);
      };
      
      els.ctxExportImg.addEventListener("click", () => runCommand([els.toolbarExportImgBtn, els.ctxExportImg], doExportImg));
      els.toolbarExportImgBtn.addEventListener("click", () => runCommand(els.toolbarExportImgBtn, () => {
          const selectedImgs = selectedObjects().filter(o => o.type === "image");
          if (selectedImgs.length === 1 && state.selected.size === 1) {
              state.ctxTargetImg = selectedImgs[0];
              return doExportImg();
          }
      }));
      
      els.viewport.addEventListener("scroll", () => {
         if(!state.drag && !state.gesture) persistWorkspace();
      }, { passive: true });

      window.addEventListener("keydown", onKey);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => persistWorkspace());
    }

    function toggleFileMenu() { els.fileMenu.classList.toggle("open"); els.fileMenuButton.classList.toggle("active"); }
    function closeFileMenu() { els.fileMenu.classList.remove("open"); els.fileMenuButton.classList.remove("active"); }

    function onPointerDown(e) {
      if (e.button === 2) return; 
      if (!state.pdfBytes && !state.pages.length) return;
      
      els.viewport.setPointerCapture(e.pointerId);
      state.activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });
      if (state.activePointers.size >= 2) { state.drag = null; beginGesture(); return; }
      if (e.pointerType === "touch" && likelyPalm(e)) return;
      
      if (state.razorMode) {
          e.preventDefault();
          const targetId = e.target.dataset && e.target.dataset.id;
          if (targetId) {
             const obj = findObject(targetId);
             if (obj) {
                 state.selected.clear();
                 state.selected.add(targetId);
                 deleteSelected();
             }
             return;
          }
          const pagePt = pointerToPage(e);
          state.selected.clear();
          state.drag = { mode: "razor-select", start: pagePt, current: pagePt };
          drawOverlay();
          drawDragRect(state.drag.start, state.drag.current);
          updateUi();
          return;
      }
      
      const pagePt = pointerToPage(e);
      const handle = e.target.dataset && e.target.dataset.handle;
      
      if (handle && state.selected.size) {
        e.preventDefault(); 
        pushUndo();
        state.drag = { mode: "resize", handle, start: pagePt, originals: selectedObjects().map(o => ({ o, b: boundsOf(o), dx: o.dx || 0, dy: o.dy || 0, sx: o.sx || 1, sy: o.sy || 1 })) };
        return;
      }
      
      const id = e.target.dataset && e.target.dataset.id;
      const isBbox = e.target.classList && e.target.classList.contains("bbox");
      
      if (id || (isBbox && state.selected.size > 0)) {
        e.preventDefault(); 
        if (id) {
          const obj = findObject(id);
          if (!obj) return;
          if (!state.selected.has(id)) {
            state.selected.clear();
            state.selected.add(id);
            drawOverlay();
            updateUi();
          }
        }
        state.drag = { mode: "move", start: pagePt, undoPushed: false, originals: selectedObjects().map(o => ({ o, dx: o.dx || 0, dy: o.dy || 0 })) };
        return;
      }
      
      state.selected.clear();
      state.drag = { mode: "select", start: pagePt, current: pagePt };
      drawOverlay();
      drawDragRect(state.drag.start, state.drag.current);
      updateUi();
    }

    function likelyPalm(e) { return e.pointerType === "touch" && (e.width > 42 || e.height > 42); }

    function beginGesture() {
      const pts = [...state.activePointers.values()];
      state.gesture = {
        distance: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
        center: { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 },
        zoom: state.zoom
      };
    }

    function onPointerMove(e) {
      if (!state.activePointers.has(e.pointerId)) return;
      state.activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY, type: e.pointerType });
      if (state.activePointers.size >= 2 && state.gesture) {
        e.preventDefault();
        const pts = [...state.activePointers.values()];
        const dist = Math.max(10, Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y));
        const center = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        const factor = dist / state.gesture.distance;
        
        zoomAt(center.x, center.y, factor);
        
        state.gesture.distance = dist;
        state.gesture.zoom = state.zoom;
        return;
      }
      if (!state.drag) return;
      const p = pointerToPage(e);
      
      if (state.drag.mode === "select" || state.drag.mode === "razor-select") {
        state.drag.current = p;
        drawOverlay();
        drawDragRect(state.drag.start, p);
      } else if (state.drag.mode === "move") {
        const dx = p.x - state.drag.start.x;
        const dy = p.y - state.drag.start.y;
        
        const moveDistPixels = Math.hypot(dx * state.zoom, dy * state.zoom);
        if (!state.drag.undoPushed && moveDistPixels > 1.5) {
          pushUndo();
          state.drag.undoPushed = true;
        }
        
        for (const item of state.drag.originals) {
          item.o.dx = item.dx + dx;
          item.o.dy = item.dy + dy;
        }
        scheduleDrawOverlay();
      } else if (state.drag.mode === "resize") {
        resizeSelection(state.drag, p);
        scheduleDrawOverlay();
      }
    }

    function onPointerUp(e) {
      state.activePointers.delete(e.pointerId);
      if (state.activePointers.size < 2) state.gesture = null;
      if (!state.drag) return;
      
      if (state.drag.mode === "select" || state.drag.mode === "razor-select") {
        const r = rectFromPoints(state.drag.start, state.drag.current);
        strictEnclosureSelect(r);
        if (state.drag.mode === "razor-select" && state.selected.size > 0) {
          deleteSelected();
        }
      } else if (state.drag.mode === "move") {
        if (state.drag.undoPushed) commitSelectedStreamMutation("move");
      } else if (state.drag.mode === "resize") {
        commitSelectedStreamMutation("resize");
      }
      state.drag = null;
      drawOverlay();
      updateUi();
    }

    function drawDragRect(a, b) {
      const r = rectFromPoints(a, b);
      els.overlay.appendChild(svg("rect", { class: "selection-rect", x: r.x, y: r.y, width: r.w, height: r.h }));
    }

    function rectFromPoints(a, b) {
      return { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(a.x - b.x), h: Math.abs(a.y - b.y) };
    }

    function strictEnclosureSelect(r) {
      const page = state.pages[state.pageIndex];
      state.selected.clear();
      if (r.w < 3 && r.h < 3) return;
      
      for (const obj of page.objects.concat(page.overlays || [])) {
        if (obj.deleted) continue;
        const b = boundsOf(obj);
        if (b.x >= r.x && b.y >= r.y && b.x + b.w <= r.x + r.w && b.y + b.h <= r.y + r.h) state.selected.add(obj.id);
      }
    }

    function resizeSelection(drag, p) {
      const all = drag.originals.map(x => x.b);
      const ub = unionBounds(all);
      
      const dx = p.x - drag.start.x;
      const dy = p.y - drag.start.y;
      
      let newUb = { ...ub };
      
      if (drag.handle.includes("e")) newUb.w = Math.max(0.1, ub.w + dx);
      if (drag.handle.includes("s")) newUb.h = Math.max(0.1, ub.h + dy);
      if (drag.handle.includes("w")) {
         const maxDx = ub.w - 0.1;
         const appliedDx = Math.min(dx, maxDx);
         newUb.x = ub.x + appliedDx;
         newUb.w = ub.w - appliedDx;
      }
      if (drag.handle.includes("n")) {
         const maxDy = ub.h - 0.1;
         const appliedDy = Math.min(dy, maxDy);
         newUb.y = ub.y + appliedDy;
         newUb.h = ub.h - appliedDy;
      }
      
      let fx = newUb.w / Math.max(0.001, ub.w);
      let fy = newUb.h / Math.max(0.001, ub.h);
      
      const isCorner = drag.handle.length === 2;
      const hasText = drag.originals.some(item => item.o.type === "text");
      
      if (isCorner && hasText) {
          const maxF = Math.max(fx, fy);
          fx = maxF;
          fy = maxF;
          
          newUb.w = ub.w * fx;
          newUb.h = ub.h * fy;
          
          if (drag.handle.includes("w")) newUb.x = (ub.x + ub.w) - newUb.w;
          if (drag.handle.includes("n")) newUb.y = (ub.y + ub.h) - newUb.h;
      }
      
      for (const item of drag.originals) {
         const nx = newUb.x + (item.b.x - ub.x) * fx;
         const ny = newUb.y + (item.b.y - ub.y) * fy;
         
         item.o.sx = item.sx * fx;
         item.o.sy = item.sy * fy;
         item.o.dx = item.dx + (nx - item.b.x);
         item.o.dy = item.dy + (ny - item.b.y);
      }
    }

    function onWheel(e) {
      if(e.ctrlKey || e.metaKey) { 
         e.preventDefault();
         const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
         zoomAt(e.clientX, e.clientY, factor);
      }
    }
    
    function zoomAtCenter(factor) {
      const r = els.viewport.getBoundingClientRect();
      zoomAt(r.left + r.width / 2, r.top + r.height / 2, factor);
    }
    
    function zoomAt(clientX, clientY, factor) {
      const pageRect = els.pageWrap.getBoundingClientRect();
      const contentX = (clientX - pageRect.left) / state.zoom;
      const contentY = (clientY - pageRect.top) / state.zoom;
      
      state.zoom = clamp(state.zoom * factor, 0.25, 15);
      applyTransform(); 
      
      const newPageRect = els.pageWrap.getBoundingClientRect();
      els.viewport.scrollLeft += (newPageRect.left + contentX * state.zoom) - clientX;
      els.viewport.scrollTop += (newPageRect.top + contentY * state.zoom) - clientY;
      
      persistWorkspace();
      updateUi();
    }

    async function goPage(index) {
      if (index < 0 || index >= state.pages.length) return;
      state.pageIndex = index;
      await renderPage(false);
      persistWorkspace();
    }
    function addBlankPage() {
      if (!state.pdfBytes && !state.pages.length) state.pages = [];
      pushUndo();
      state.pages.splice(state.pageIndex + 1, 0, { sourceIndex: null, objects: [], overlays: [], blank: true, width: state.pageSize.width, height: state.pageSize.height });
      state.pageIndex++;
      state.pageCount = state.pages.length;
      renderPage(false); persistWorkspace();
    }
    async function deleteCurrentPage() {
      if (!state.pages.length) return;
      const ok = await confirmBox("Delete Current Page", "Această pagină va fi ștearsă din document.");
      if (!ok) return;
      pushUndo();
      state.pages.splice(state.pageIndex, 1);
      state.pageIndex = Math.max(0, Math.min(state.pageIndex, state.pages.length - 1));
      state.pageCount = state.pages.length;
      if (!state.pages.length) { 
         state.fileName = null; state.pdfBytes = null; state.pdfDoc = null; state.pages = []; state.selected.clear();
         els.pdfCanvas.width = 1; els.pdfCanvas.height = 1; els.overlay.innerHTML = "";
         els.pageWrap.style.width = "0px"; els.pageWrap.style.height = "0px";
         els.stage.style.width = "0px"; els.stage.style.height = "0px";
         els.dropHint.style.display = "grid";
         updateUi();
         await persistWorkspace(); 
      } else { 
         await renderPage(false); persistWorkspace(); 
      }
    }
    function deleteSelected() {
      if (!selectedObjects().length) return;
      pushUndo();
      commitSelectedStreamMutation("delete");
    }

    function findTextShowSpans(stream, tokens, pageHeight) {
      const out = [];
      const stack = [];
      let ctm = [1, 0, 0, 1, 0, 0], tm = [1, 0, 0, 1, 0, 0], tlm = [1, 0, 0, 1, 0, 0];
      let font = null, fontSize = 12, leading = 0;
      let state = { w: null, RG: null, rg: null, J: null, j: null, M: null, d: null, gs: null, Tc: null, Tw: null, Tz: null, Tr: null, Ts: null, RGCS: null, rgcs: null };
      
      for (let i = 0; i < tokens.length; i++) {
        const op = tokens[i].value;
        if (op === "q") stack.push({ ctm: ctm.slice(), tm: tm.slice(), tlm: tlm.slice(), font, fontSize, leading, state: { ...state } });
        else if (op === "Q") { const p = stack.pop(); if (p) ({ ctm, tm, tlm, font, fontSize, leading, state } = p); }
        else if (op === "cm") { const m = numbersBefore(tokens, i, 6); if (m) ctm = multiplyMatrix(ctm, m); }
        else if (op === "w" || op === "J" || op === "j" || op === "M") { const n = numbersBefore(tokens, i, 1); if (n) state[op] = `${n[0]} ${op}`; }
        else if (op === "d") { const startTok = tokens[i-2]; if (startTok && startTok.value.startsWith("[")) state.d = stream.slice(startTok.start, tokens[i].end); }
        else if (op === "RG" || op === "rg") { const n = numbersBefore(tokens, i, 3); if (n) state[op] = `${n.map(num).join(" ")} ${op}`; }
        else if (op === "K" || op === "k") { const n = numbersBefore(tokens, i, 4); if (n) state[op === "K" ? "RG" : "rg"] = `${n.map(num).join(" ")} ${op}`; }
        else if (op === "G" || op === "g") { const n = numbersBefore(tokens, i, 1); if (n) state[op === "G" ? "RG" : "rg"] = `${n[0]} ${op}`; }
        else if (op === "CS" || op === "cs") { const n = tokens[i-1]; if (n) state[op === "CS" ? "RGCS" : "rgcs"] = `${n.value} ${op}`; }
        else if (op === "gs") { const n = tokens[i-1]; if (n) state.gs = `${n.value} gs`; }
        else if (op === "Tc" || op === "Tw" || op === "Tz" || op === "Tr" || op === "Ts") { const n = numbersBefore(tokens, i, 1); if (n) state[op] = `${n[0]} ${op}`; }
        else if (op === "BT") { tm = [1,0,0,1,0,0]; tlm = [1,0,0,1,0,0]; }
        else if (op === "Tf") { const f = tokens[i-2]?.value, s = parseFloat(tokens[i-1]?.value); if (f && f[0] === "/") font = f; if (Number.isFinite(s)) fontSize = s; }
        else if (op === "TL") { const n = parseFloat(tokens[i-1]?.value); if (Number.isFinite(n)) leading = n; }
        else if (op === "Tm") { const m = numbersBefore(tokens, i, 6); if (m) { tm = m.slice(); tlm = m.slice(); } }
        else if (op === "Td" || op === "TD") { const n = numbersBefore(tokens, i, 2); if (n) { if (op === "TD") leading = -n[1]; tlm = multiplyMatrix(tlm, [1,0,0,1,n[0],n[1]]); tm = tlm.slice(); } }
        else if (op === "T*") { tlm = multiplyMatrix(tlm, [1,0,0,1,0,-leading]); tm = tlm.slice(); }
        else if (["Tj", "TJ", "'", "\""].includes(op)) {
          let start = null;
          if (op === "Tj" || op === "'") start = tokens[i - 1]?.start ?? null;
          else if (op === "\"") start = tokens[i - 3]?.start ?? tokens[i - 1]?.start ?? null;
          else if (op === "TJ") { let d = 0; for (let k = i - 1; k >= 0; k--) { if (tokens[k].value === "]") d++; if (tokens[k].value === "[") { if (d <= 1) { start = tokens[k].start; break; } d--; } } }
          
          if (start === null) continue;
          if (op === "'" || op === "\"") { tlm = multiplyMatrix(tlm, [1,0,0,1,0,-leading]); tm = tlm.slice(); }
          const p = applyMatrix(ctm, tm[4], tm[5]);
          out.push({ op, start, end: tokens[i].end, pageX: p.x, pdfY: p.y, font, fontSize, ctm: ctm.slice(), tm: tm.slice(), state: { ...state } });
          tm = multiplyMatrix(tm, [1,0,0,1, (op === "Tj" ? (tokens[i-1]?.value.length||0)*fontSize*.5 : 0), 0]);
        }
      }
      return out;
    }

    function getRawTextCmd(stream, obj, pageHeight, usedTokens) {
      const tokens = tokenizePdfContent(stream);
      const out = findTextShowSpans(stream, tokens, pageHeight);
      
      const targetX = obj.rawX !== undefined ? obj.rawX : (obj.origX || obj.x);
      const targetY = obj.rawY !== undefined ? obj.rawY : pageHeight - ((obj.origY || obj.y) + Math.min(obj.h / (obj.sy||1), obj.fontSize || obj.h / (obj.sy||1)) * .78);
      let best = null, bestScore = Infinity;
      for (const show of out) {
        const dx = Math.abs(show.pageX - targetX), dy = Math.abs(show.pdfY - targetY);
        if (dx + dy < bestScore) { bestScore = dx + dy; best = show; }
      }
      
      if (!best || bestScore > Math.max(36, (obj.w / (obj.sx||1)) * 1.4)) return null;
      if (usedTokens && usedTokens.has(best.start)) return " ";
      if (usedTokens) usedTokens.add(best.start);
      const s = best.state;
      const stateStr = [s.gs, s.RGCS, s.rgcs, s.RG, s.rg, s.w, s.J, s.j, s.M, s.d, s.Tc, s.Tw, s.Tz, s.Tr, s.Ts].filter(Boolean).join(" ");
      return `${stateStr} ${best.ctm.map(num).join(" ")} cm BT ${best.font} ${num(best.fontSize)} Tf ${best.tm.map(num).join(" ")} Tm ${stream.slice(best.start, best.end)} ET`;
    }

    function getRawVectorCmd(stream, obj, pageHeight, usedTokens) {
      const tokens = tokenizePdfContent(stream);
      let ctm = [1,0,0,1,0,0];
      const stack = [];
      let currentPath = [];
      let pathStartIndex = -1;
      let state = { w: null, RG: null, rg: null, J: null, j: null, M: null, d: null, gs: null, RGCS: null, rgcs: null };

      const targetB = { x: obj.origX || obj.x, y: obj.origY || obj.y, w: obj.w / (obj.sx||1), h: obj.h / (obj.sy||1) };
      const T = 1.5;

      for(let i=0; i<tokens.length; i++) {
          const op = tokens[i].value;
          if (op === "q") stack.push({ ctm: ctm.slice(), state: { ...state }});
          else if (op === "Q") { const p = stack.pop(); if (p) { ctm = p.ctm; state = p.state; } }
          else if (op === "cm") { const m = numbersBefore(tokens, i, 6); if (m) ctm = multiplyMatrix(ctm, m); }
          else if (op === "w" || op === "J" || op === "j" || op === "M") { const n = numbersBefore(tokens, i, 1); if (n) state[op] = `${n[0]} ${op}`; }
          else if (op === "d") { const startTok = tokens[i-2]; if (startTok && startTok.value.startsWith("[")) state.d = stream.slice(startTok.start, tokens[i].end); }
          else if (op === "RG" || op === "rg") { const n = numbersBefore(tokens, i, 3); if (n) state[op] = `${n.map(num).join(" ")} ${op}`; }
          else if (op === "K" || op === "k") { const n = numbersBefore(tokens, i, 4); if (n) state[op === "K" ? "RG" : "rg"] = `${n.map(num).join(" ")} ${op}`; }
          else if (op === "G" || op === "g") { const n = numbersBefore(tokens, i, 1); if (n) state[op === "G" ? "RG" : "rg"] = `${n[0]} ${op}`; }
          else if (op === "CS" || op === "cs") { const n = tokens[i-1]; if (n) state[op === "CS" ? "RGCS" : "rgcs"] = `${n.value} ${op}`; }
          else if (op === "gs") { const n = tokens[i-1]; if (n) state.gs = `${n.value} gs`; }
          else if (op === "re") {
              const n = numbersBefore(tokens, i, 4);
              if (n) {
                  const p1 = applyMatrix(ctm, n[0], n[1]);
                  const p2 = applyMatrix(ctm, n[0]+n[2], n[1]+n[3]);
                  const minX = Math.min(p1.x, p2.x), minY = Math.min(p1.y, p2.y);
                  const maxX = Math.max(p1.x, p2.x), maxY = Math.max(p1.y, p2.y);
                  const x = minX, y = pageHeight - maxY, w = Math.max(0.2, maxX - minX), h = Math.max(0.2, maxY - minY);

                  if (Math.abs(x - targetB.x) < T && Math.abs(y - targetB.y) < T && Math.abs(w - targetB.w) < T && Math.abs(h - targetB.h) < T) {
                      pathStartIndex = tokens[i-4].start;
                  }
                  currentPath.push({op: "re", orig: n, ctm: ctm.slice()});
              }
          }
          else if (op === "m" || op === "l" || op === "c" || op === "v" || op === "y") {
              let count = 2; if(op==="c") count=6; else if(op==="v"||op==="y") count=4;
              const n = numbersBefore(tokens, i, count);
              if (n) {
                  if (currentPath.length === 0) pathStartIndex = tokens[i-count].start;
                  currentPath.push({ op, orig: n, ctm: ctm.slice() });
              }
          }
          else if (["S", "s", "f", "F", "B", "b", "W", "W*", "n"].includes(op)) {
              if (currentPath.length > 0) {
                  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                  for(const cmd of currentPath) {
                      if (cmd.op === "re") {
                          const rx = cmd.orig[0], ry = cmd.orig[1], rw = cmd.orig[2], rh = cmd.orig[3];
                          const pt1 = applyMatrix(cmd.ctm, rx, ry);
                          const pt2 = applyMatrix(cmd.ctm, rx + rw, ry + rh);
                          minX = Math.min(minX, Math.min(pt1.x, pt2.x));
                          minY = Math.min(minY, Math.min(pt1.y, pt2.y));
                          maxX = Math.max(maxX, Math.max(pt1.x, pt2.x));
                          maxY = Math.max(maxY, Math.max(pt1.y, pt2.y));
                          continue;
                      }
                      if(!cmd.orig) continue;
                      for(let j=0; j<cmd.orig.length; j+=2) {
                          const pt = applyMatrix(cmd.ctm, cmd.orig[j], cmd.orig[j+1]);
                          minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
                          maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
                      }
                  }

                  const x = minX, y = pageHeight - maxY, w = Math.max(0.2, maxX - minX), h = Math.max(0.2, maxY - minY);
                  if (Math.abs(x - targetB.x) < T && Math.abs(y - targetB.y) < T && Math.abs(w - targetB.w) < T && Math.abs(h - targetB.h) < T) {
                      if (usedTokens && usedTokens.has(pathStartIndex)) {
                          currentPath = [];
                          continue; // keep looking for another matching offset sequence!
                      }
                      if(usedTokens) usedTokens.add(pathStartIndex);
                      const slice = stream.slice(pathStartIndex, tokens[i].end);
                      const stateStr = [state.gs, state.RGCS, state.rgcs, state.RG, state.rg, state.w, state.J, state.j, state.M, state.d].filter(Boolean).join(" ");
                      return `${stateStr} ${ctm.map(num).join(" ")} cm ${slice}`;
                  }
                  currentPath = [];
              }
          }
      }
      return null;
    }

    async function copySelected() {
      const objs = selectedObjects();
      if (!objs.length) return;
      
      const { PDFDocument, PDFName, PDFArray } = PDFLib;
      const pdfDoc = await PDFDocument.load(state.pdfBytes.slice(0), { ignoreEncryption: true });
      const sourceIndex = state.pages[state.pageIndex]?.sourceIndex ?? state.pageIndex;
      const page = pdfDoc.getPage(sourceIndex);
      const contents = page.node.Contents();
      
      const refs = [];
      if (contents instanceof PDFArray) { for(let i=0; i<contents.size(); i++) refs.push(pdfDoc.context.lookup(contents.get(i))); } 
      else refs.push(pdfDoc.context.lookup(contents));
      
      const streams = refs.map(ref => {
          const bytes = ref.getContents ? ref.getContents() : ref.contents;
          const filter = ref.dict?.get?.(PDFName.of("Filter"))?.toString() || "";
          let s = ""; const arr = /FlateDecode/.test(filter) ? pako.inflate(bytes) : bytes;
          for(let i=0; i<arr.length; i+=0x8000) s += String.fromCharCode.apply(null, arr.subarray(i, i+0x8000));
          return s;
      });
      const fullStream = streams.join("\n");
      const pageHeight = page.getSize().height;

      const exportList = [];
      const usedTokens = new Set();
      for (const o of objs) {
          const bakedObj = {
              ...o,
              origX: o.x, origY: o.y, 
              x: o.x + (o.dx || 0), y: o.y + (o.dy || 0),
              w: o.w * (o.sx || 1), h: o.h * (o.sy || 1),
              dx: 0, dy: 0, sx: 1, sy: 1,
              id: undefined, deleted: false
          };
          
          if (o.type === "image") {
              try {
                  const dataStr = await extractImageBase64(o);
                  exportList.push({...bakedObj, imageData: dataStr});
              } catch(e) {
                  exportList.push(bakedObj);
              }
          } else if (o.type === "text") {
              const raw = getRawTextCmd(fullStream, o, pageHeight, usedTokens);
              exportList.push({...bakedObj, rawCmd: raw});
          } else {
              const raw = getRawVectorCmd(fullStream, o, pageHeight, usedTokens);
              exportList.push({...bakedObj, rawCmd: raw});
          }
      }
      
      try {
          const sourceIndex = state.pages[state.pageIndex]?.sourceIndex ?? state.pageIndex;
          await idbPut(STORE.workspace, { objects: exportList, srcBytes: state.pdfBytes, srcPageIndex: sourceIndex }, "clipboard");
          localStorage.setItem("vector-score-clip-tick", Date.now().toString());
          toast("Copiat", `${objs.length} elemente gata pentru Paste.`);
      } catch(e) {
          toast("Eroare", "Date prea mari pentru clipboard.", "error");
      }
      updateUi();
    }

    async function pasteClipboard(targetPos = null) {
      let clip = null;
      try { clip = await idbGet(STORE.workspace, "clipboard"); } catch(e) {}
      
      const isLegacyArray = Array.isArray(clip);
      const objects = isLegacyArray ? clip : clip?.objects;
      
      if (!objects || !objects.length || !state.pages[state.pageIndex]) return;
      
      pushUndo();
      try {
        let offsetX = 0;
        let offsetY = 0;
        
        if (targetPos) {
            const b = unionBounds(objects.map(o => ({x: o.x, y: o.y, w: o.w, h: o.h})));
            offsetX = targetPos.x - b.x;
            offsetY = targetPos.y - b.y;
        } else {
            offsetX = 0; 
            offsetY = 0;
        }
        
        const expectedPasted = objects.map(item => ({
            type: item.type,
            x: item.x + offsetX,
            y: item.y + offsetY,
            w: item.w,
            h: item.h
        }));

        state.pdfBytes = await appendObjectsToCurrentPage({ objects, srcBytes: clip.srcBytes, srcPageIndex: clip.srcPageIndex }, offsetX, offsetY);
        state.pages[state.pageIndex].objects = []; state.pages[state.pageIndex].overlays = [];
        state.selected.clear();
        await loadPdf(state.pdfBytes, false, false);
        
        const newPageObj = state.pages[state.pageIndex];
        if (newPageObj && newPageObj.objects.length > 0) {
            for (const id of pickNewestMatchingObjects(newPageObj.objects, expectedPasted)) state.selected.add(id);
        }
        
        persistWorkspace(); 
        drawOverlay();
        updateUi();
      } catch (err) {
        const snap = state.undo.pop(); if (snap) restoreSnapshot(snap);
        toast("Eroare la lipire", readableError(err), "error");
      }
    }

    const activeKeys = new Set();
    function onKey(e) {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key.toLowerCase() === "o") { e.preventDefault(); els.pdfInput.click(); }
      if (ctrl && e.key.toLowerCase() === "s") { e.preventDefault(); exportPdf(); }
      if (ctrl && e.key.toLowerCase() === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
      if (ctrl && e.key.toLowerCase() === "y") { e.preventDefault(); redo(); }
      if (ctrl && e.key.toLowerCase() === "c") { e.preventDefault(); runCommand(els.copySel, copySelected); }
      if (ctrl && e.key.toLowerCase() === "v") { e.preventDefault(); runCommand(els.pasteSel, () => pasteClipboard()); }
      if (e.key === "Delete" || e.key === "Backspace") { e.preventDefault(); runCommand(els.deleteSel, deleteSelected); }
      
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(e.key) && state.selected.size > 0) {
        e.preventDefault();
        
        const step = (e.shiftKey ? 10 : 1) / state.zoom;
        
        const act = () => {
           if (e.key === "ArrowLeft") nudge(-step, 0);
           if (e.key === "ArrowRight") nudge(step, 0);
           if (e.key === "ArrowUp") nudge(0, -step);
           if (e.key === "ArrowDown") nudge(0, step);
        };

        if (e.repeat) {
           act();
        } else {
           activeKeys.add(e.key);
           act();
        }
      }
    }
    function onKeyUp(e) {
      activeKeys.delete(e.key);
    }

    function nudge(dx, dy) {
      const objs = selectedObjects();
      if (!objs.length) return;
      
      if (!state.drag || state.drag.mode !== "nudge") {
        pushUndo();
        state.drag = { mode: "nudge", originals: objs.map(o => ({ o, dx: o.dx || 0, dy: o.dy || 0 })) };
      }
      
      for (const item of state.drag.originals) { item.o.dx += dx; item.o.dy += dy; }
      scheduleDrawOverlay();
      
      clearTimeout(nudgeTimeout);
      nudgeTimeout = setTimeout(() => {
        if (state.drag && state.drag.mode === "nudge" && activeKeys.size === 0) {
          commitSelectedStreamMutation("move");
          state.drag = null;
        }
      }, 500); 
    }

    function undo() {
      if (!state.undo.length) return;
      state.redo.push(snapshot()); restoreSnapshot(state.undo.pop());
    }
    function redo() {
      if (!state.redo.length) return;
      state.undo.push(snapshot()); restoreSnapshot(state.redo.pop());
    }

    function applyMatrix(m, x, y) { return { x: m[0] * x + m[2] * y + m[4], y: m[1] * x + m[3] * y + m[5] }; }
    function multiplyMatrix(a, b) {
      return [ a[0]*b[0]+a[2]*b[1], a[1]*b[0]+a[3]*b[1], a[0]*b[2]+a[2]*b[3], a[1]*b[2]+a[3]*b[3], a[0]*b[4]+a[2]*b[5]+a[4], a[1]*b[4]+a[3]*b[5]+a[5] ];
    }
    function invertMatrix(m) {
      const a = m[0], b = m[1], c = m[2], d = m[3], e = m[4], f = m[5];
      const det = a*d - b*c;
      if (Math.abs(det) < 1e-10) return [1,0,0,1,0,0];
      return [ d/det, -b/det, -c/det, a/det, (c*f - d*e)/det, (b*e - a*f)/det ];
    }
    function transformPoint(pt, obj, pageHeight, invCtm, ctm) {
      const pdfPt = applyMatrix(ctm, pt.x, pt.y);
      const domX = pdfPt.x;
      const domY = pageHeight - pdfPt.y;
      const relX = domX - obj.x;
      const relY = domY - obj.y;
      const newDomX = (obj.x + (obj.dx || 0)) + relX * (obj.sx || 1);
      const newDomY = (obj.y + (obj.dy || 0)) + relY * (obj.sy || 1);
      return applyMatrix(invCtm, newDomX, pageHeight - newDomY);
    }

    function tokenizePdfContent(src) {
      const tokens = []; let i = 0;
      while (i < src.length) {
        const c = src[i];
        if (/\s/.test(c)) { i++; continue; }
        if (c === "%") { while (i < src.length && src[i] !== "\n" && src[i] !== "\r") i++; continue; }
        const start = i;
        if (c === "(") {
          let d = 0; while (i < src.length) { const ch = src[i++]; if (ch === "\\") i++; else if (ch === "(") d++; else if (ch === ")") { d--; if (d <= 0) break; } }
          tokens.push({ value: src.slice(start, i), start, end: i }); continue;
        }
        if (c === "<" && src[i + 1] !== "<") { i++; while (i < src.length && src[i] !== ">") i++; i++; tokens.push({ value: src.slice(start, i), start, end: i }); continue; }
        if ("[]{}<>".includes(c)) { if ((c === "<" || c === ">") && src[i + 1] === c) i += 2; else i++; tokens.push({ value: src.slice(start, i), start, end: i }); continue; }
        if (c === "/" || c === "'" || c === "\"") {
          i++; if (c === "/") while (i < src.length && !/[\s\[\]\(\)<>\/%{}]/.test(src[i])) i++;
          tokens.push({ value: src.slice(start, i), start, end: i }); continue;
        }
        while (i < src.length && !/[\s\[\]\(\)<>\/%{}]/.test(src[i])) i++;
        tokens.push({ value: src.slice(start, i), start, end: i });
      }
      return tokens;
    }

    function numbersBefore(tokens, opIndex, count) {
      if (opIndex < count) return null;
      const vals = tokens.slice(opIndex - count, opIndex).map(t => parseFloat(t.value));
      return vals.every(Number.isFinite) ? vals : null;
    }

    function mutateImageInStream(stream, obj, action, pageHeight) {
      const tokens = tokenizePdfContent(stream);
      let ctm = [1,0,0,1,0,0];
      const stack = [];
      let text = stream;
      let offset = 0;
      let changed = false;

      const targetB = { x: obj.x, y: obj.y, w: obj.w, h: obj.h };
      const T = 1.5;

      for(let i=0; i<tokens.length; i++) {
          const op = tokens[i].value;
          if (op === "q") stack.push(ctm.slice());
          else if (op === "Q") { const p = stack.pop(); if (p) ctm = p; }
          else if (op === "cm") { const m = numbersBefore(tokens, i, 6); if (m) ctm = multiplyMatrix(ctm, m); }
          else if (op === "Do") {
              const n = tokens[i-1]?.value;
              if (n === "/" + obj.name) {
                  const pt1 = applyMatrix(ctm, 0, 0);
                  const pt2 = applyMatrix(ctm, 1, 1);
                  const minX = Math.min(pt1.x, pt2.x);
                  const minY = Math.min(pt1.y, pt2.y);
                  const maxX = Math.max(pt1.x, pt2.x);
                  const maxY = Math.max(pt1.y, pt2.y);
                  const x = minX, y = pageHeight - maxY, w = Math.max(0.2, maxX - minX), h = Math.max(0.2, maxY - minY);
                  
                  if (Math.abs(x - targetB.x) < T && Math.abs(y - targetB.y) < T &&
                      Math.abs(w - targetB.w) < T && Math.abs(h - targetB.h) < T) {
                      
                      let rep = "";
                      if (action !== "delete") {
                          const newW = obj.w * (obj.sx || 1);
                          const newH = obj.h * (obj.sy || 1);
                          const newX = obj.x + (obj.dx || 0);
                          const newY = obj.y + (obj.dy || 0); 
                          
                          const pdfNewMinX = newX;
                          const pdfNewMaxY = pageHeight - newY;
                          const pdfNewMinY = pdfNewMaxY - newH;
                          
                          const invCtm = invertMatrix(ctm);
                          const ctmNew = [newW, 0, 0, newH, pdfNewMinX, pdfNewMinY];
                          const mInj = multiplyMatrix(invCtm, ctmNew);
                          
                          rep = `q ${mInj.map(num).join(" ")} cm /${obj.name} Do Q`;
                      }
                      
                      const aS = tokens[i-1].start + offset;
                      const aE = tokens[i].end + offset;
                      text = text.slice(0, aS) + (rep !== "" ? rep + " " : "") + text.slice(aE);
                      offset += rep.length - (aE - aS);
                      changed = true;
                      targetB.x += 9999; 
                  }
              }
          }
      }
      return { changed, text, score: changed ? 0 : Infinity };
    }

    function mutateVectorInStream(stream, obj, action, pageHeight) {
      if (obj.type === "image") return mutateImageInStream(stream, obj, action, pageHeight);

      const tokens = tokenizePdfContent(stream);
      let ctm = [1,0,0,1,0,0];
      const stack = [];
      let currentPath = [];
      let pathStartIndex = -1;
      let text = stream;
      let offset = 0;
      let changed = false;

      const targetB = { x: obj.x, y: obj.y, w: obj.w, h: obj.h };
      const T = 1.5;

      for(let i=0; i<tokens.length; i++) {
          const op = tokens[i].value;
          if (op === "q") stack.push(ctm.slice());
          else if (op === "Q") { const p = stack.pop(); if (p) ctm = p; }
          else if (op === "cm") { const m = numbersBefore(tokens, i, 6); if (m) ctm = multiplyMatrix(ctm, m); }
          else if (op === "re") {
              const n = numbersBefore(tokens, i, 4);
              if (n) {
                  const p1 = applyMatrix(ctm, n[0], n[1]);
                  const p2 = applyMatrix(ctm, n[0]+n[2], n[1]+n[3]);
                  const minX = Math.min(p1.x, p2.x), minY = Math.min(p1.y, p2.y);
                  const maxX = Math.max(p1.x, p2.x), maxY = Math.max(p1.y, p2.y);
                  const x = minX, y = pageHeight - maxY, w = Math.max(0.2, maxX - minX), h = Math.max(0.2, maxY - minY);

                  if (Math.abs(x - targetB.x) < T && Math.abs(y - targetB.y) < T &&
                      Math.abs(w - targetB.w) < T && Math.abs(h - targetB.h) < T) {
                      
                      let rep = "";
                      if (action !== "delete") {
                          const invCtm = invertMatrix(ctm);
                          const bl = transformPoint({x: n[0], y: n[1]}, obj, pageHeight, invCtm, ctm);
                          const tr = transformPoint({x: n[0]+n[2], y: n[1]+n[3]}, obj, pageHeight, invCtm, ctm);
                          const newX = Math.min(bl.x, tr.x);
                          const newY = Math.min(bl.y, tr.y);
                          const newW = Math.abs(tr.x - bl.x);
                          const newH = Math.abs(tr.y - bl.y);
                          rep = `${num(newX)} ${num(newY)} ${num(newW)} ${num(newH)} re`;
                      }
                      
                      if(rep !== "") rep += " ";
                      const aS = tokens[i-4].start + offset, aE = tokens[i].end + offset;
                      text = text.slice(0, aS) + rep + text.slice(aE);
                      offset += rep.length - (aE - aS);
                      changed = true;
                      targetB.x += 9999;
                  }
                  currentPath.push({ op, orig: n, ctm: ctm.slice(), start: tokens[i-4].start, end: tokens[i].end });
              }
          }
          else if (op === "m" || op === "l" || op === "c" || op === "v" || op === "y") {
              let count = 2; if(op==="c") count=6; else if(op==="v"||op==="y") count=4;
              const n = numbersBefore(tokens, i, count);
              if (n) {
                  if (currentPath.length === 0) pathStartIndex = tokens[i-count].start;
                  currentPath.push({ op, orig: n, ctm: ctm.slice(), start: tokens[i-count].start, end: tokens[i].end });
              }
          }
          else if (["S", "s", "f", "F", "B", "b"].includes(op)) {
              if (currentPath.length > 0) {
                  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                  for(const cmd of currentPath) {
                      if (cmd.op === "re") {
                          const rx = cmd.orig[0], ry = cmd.orig[1], rw = cmd.orig[2], rh = cmd.orig[3];
                          const pt1 = applyMatrix(cmd.ctm, rx, ry);
                          const pt2 = applyMatrix(cmd.ctm, rx + rw, ry + rh);
                          minX = Math.min(minX, Math.min(pt1.x, pt2.x));
                          minY = Math.min(minY, Math.min(pt1.y, pt2.y));
                          maxX = Math.max(maxX, Math.max(pt1.x, pt2.x));
                          maxY = Math.max(maxY, Math.max(pt1.y, pt2.y));
                          continue;
                      }
                      if(!cmd.orig) continue;
                      for(let j=0; j<cmd.orig.length; j+=2) {
                          const pt = applyMatrix(cmd.ctm, cmd.orig[j], cmd.orig[j+1]);
                          minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
                          maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
                      }
                  }

                  const x = minX, y = pageHeight - maxY, w = Math.max(0.2, maxX - minX), h = Math.max(0.2, maxY - minY);
                  if (Math.abs(x - targetB.x) < T && Math.abs(y - targetB.y) < T &&
                      Math.abs(w - targetB.w) < T && Math.abs(h - targetB.h) < T) {

                          let rep = "";
                          if (action !== "delete") {
                              const invCtm = invertMatrix(ctm);
                              for(const cmd of currentPath) {
                                  if (cmd.op === "re") {
                                      const bl = transformPoint({x: cmd.orig[0], y: cmd.orig[1]}, obj, pageHeight, invCtm, cmd.ctm);
                                      const tr = transformPoint({x: cmd.orig[0]+cmd.orig[2], y: cmd.orig[1]+cmd.orig[3]}, obj, pageHeight, invCtm, cmd.ctm);
                                      const rx = Math.min(bl.x, tr.x), ry = Math.min(bl.y, tr.y);
                                      const rw = Math.abs(tr.x - bl.x), rh = Math.abs(tr.y - bl.y);
                                      rep += `${num(rx)} ${num(ry)} ${num(rw)} ${num(rh)} ${cmd.op} `;
                                  } else {
                                      const newOrig = [];
                                      for(let j=0; j<cmd.orig.length; j+=2) {
                                          const pt = transformPoint({x: cmd.orig[j], y: cmd.orig[j+1]}, obj, pageHeight, invCtm, cmd.ctm);
                                          newOrig.push(pt.x, pt.y);
                                      }
                                      rep += newOrig.map(num).join(" ") + ` ${cmd.op} `;
                                  }
                              }
                              rep += `${op} `;
                          }

                          const aS = pathStartIndex + offset, aE = tokens[i].end + offset;
                          text = text.slice(0, aS) + rep + text.slice(aE);
                          offset += rep.length - (aE - aS);
                          changed = true;
                          targetB.x += 9999;
                      }
                  currentPath = [];
              }
          }
          else if (op === "n") { currentPath = []; }
      }
      return { changed, text, score: changed ? 0 : Infinity };
    }

    function mutateTextInStream(stream, obj, action, pageHeight) {
      const tokens = tokenizePdfContent(stream);
      const shows = findTextShowSpans(stream, tokens, pageHeight);
      
      const b = boundsOf(obj, true);
      const targetX = obj.rawX !== undefined ? obj.rawX : b.x;
      const targetY = obj.rawY !== undefined ? obj.rawY : pageHeight - (b.y + Math.min(b.h, obj.fontSize || b.h) * .78);
      let best = null, bestScore = Infinity;
      for (const show of shows) {
        const dx = Math.abs(show.pageX - targetX), dy = Math.abs(show.pdfY - targetY);
        if (dx + dy < bestScore) { bestScore = dx + dy; best = show; }
      }
      
      if (!best || bestScore > Math.max(36, b.w * 1.4)) return { changed: false, text: stream, score: Infinity };
      
      const isStandardText = /^[\x20-\x7F]*$/.test(obj.text);
      const newBaselineX = obj.x + (obj.dx || 0);
      const newBaselineY = obj.y + (obj.dy || 0) + (obj.h * (obj.sy || 1)) * (isStandardText ? 0.8 : 0.7);

      const invCtm = invertMatrix(best.ctm);
      const targetTmPt = applyMatrix(invCtm, newBaselineX, pageHeight - newBaselineY);

      const tmA = best.tm[0], tmB = best.tm[1], tmC = best.tm[2], tmD = best.tm[3];
      const tmDet = tmA * tmD - tmB * tmC;
      const invTm = Math.abs(tmDet) < 1e-10 ? [1, 0, 0, 1] : [tmD / tmDet, -tmB / tmDet, -tmC / tmDet, tmA / tmDet];

      const deltaTmX = targetTmPt.x - best.tm[4];
      const deltaTmY = targetTmPt.y - best.tm[5];

      const localDx = deltaTmX * invTm[0] + deltaTmY * invTm[2];
      const localDy = deltaTmX * invTm[1] + deltaTmY * invTm[3];
      
      let rep = stream.slice(best.start, best.end);
      if (action === "delete") rep = best.op === "TJ" ? "[] TJ" : (best.op === "\"" ? "0 0 () \"" : (best.op === "'" ? "() '" : "() Tj"));
      else if (action === "move") rep = `${num(localDx)} ${num(localDy)} Td ${rep} ${num(-localDx)} ${num(-localDy)} Td`;
      else if (action === "resize") {
          const fs = Math.max(1, best.fontSize * Math.max(obj.sx || 1, obj.sy || 1));
          rep = `${num(localDx)} ${num(localDy)} Td ${best.font} ${num(fs)} Tf ${rep} ${best.font} ${num(best.fontSize)} Tf ${num(-localDx)} ${num(-localDy)} Td`;
      }
      return { changed: true, text: stream.slice(0, best.start) + rep + stream.slice(best.end), score: bestScore };
    }

    async function commitSelectedStreamMutation(action) {
      const objs = selectedObjects();
      if (!objs.length || !state.pdfBytes) return;
      
      const savedSelection = Array.from(state.selected); 
      
      const expectedPostAction = [];
      if (action !== "delete") {
          for (const o of objs) {
              expectedPostAction.push({
                  type: o.type,
                  x: o.x + (o.dx || 0),
                  y: o.y + (o.dy || 0),
                  w: o.w * (o.sx || 1),
                  h: o.h * (o.sy || 1)
              });
          }
      }
      
      try {
        const result = await mutatePageContentStreams(objs, action);
        if (!result.changed) {
          if (state.undo.length) state.undo.pop();
          await reloadCurrentBytes();
          return;
        }
        state.pdfBytes = result.bytes;
        state.pages[state.pageIndex].objects = []; state.pages[state.pageIndex].overlays = [];
        state.selected.clear();
        
        await loadPdf(state.pdfBytes, false, true);
        
        if (action !== "delete" && expectedPostAction.length > 0) {
            const newPageObj = state.pages[state.pageIndex];
            if (newPageObj && newPageObj.objects.length > 0) {
                for (const id of pickNewestMatchingObjects(newPageObj.objects, expectedPostAction)) state.selected.add(id);
            }
            drawOverlay();
            updateUi();
        }
        
        await persistWorkspace();
      } catch (err) {
        if (state.undo.length) restoreSnapshot(state.undo.pop()); else await reloadCurrentBytes();
        toast("Eroare la scriere", readableError(err), "error");
      }
    }

    async function reloadCurrentBytes() {
      state.pages[state.pageIndex].objects = []; state.pages[state.pageIndex].overlays = [];
      state.selected.clear();
      if (state.pdfBytes) await loadPdf(state.pdfBytes, false, false); else await renderPage(false);
    }

    async function mutatePageContentStreams(objs, action) {
      const { PDFDocument, PDFName, PDFArray } = PDFLib;
      const pdfDoc = await PDFDocument.load(state.pdfBytes.slice(0), { ignoreEncryption: true });
      const sourceIndex = state.pages[state.pageIndex]?.sourceIndex ?? state.pageIndex;
      const page = pdfDoc.getPage(sourceIndex);
      const pageHeight = page.getSize().height;
      const contents = page.node.Contents();
      
      const refs = [];
      if (contents instanceof PDFArray) { for(let i=0; i<contents.size(); i++) refs.push({ ref: contents.get(i), stream: pdfDoc.context.lookup(contents.get(i)) }); } 
      else refs.push({ ref: contents, stream: pdfDoc.context.lookup(contents) });
      
      const decodedTexts = refs.map(item => {
         const bytes = item.stream.getContents ? item.stream.getContents() : item.stream.contents;
         const filter = item.stream.dict?.get?.(PDFName.of("Filter"))?.toString() || "";
         let s = ""; const arr = /FlateDecode/.test(filter) ? pako.inflate(bytes) : bytes;
         for(let i=0; i<arr.length; i+=0x8000) s += String.fromCharCode.apply(null, arr.subarray(i, i+0x8000));
         return s;
      });
      
      let combinedText = decodedTexts.join("\n");
      let changed = 0;
      
      for (const obj of objs) {
          const next = obj.type === "text" 
            ? mutateTextInStream(combinedText, obj, action, pageHeight) 
            : mutateVectorInStream(combinedText, obj, action, pageHeight);
            
          if (next.changed) { combinedText = next.text; changed++; }
      }
      if (!changed) return { changed: 0 };
      
      const newRef = pdfDoc.context.register(pdfDoc.context.flateStream(combinedText, {}));
      page.node.set(PDFName.of("Contents"), newRef);
      const bytes = await pdfDoc.save({ useObjectStreams: false });
      return { changed, bytes };
    }

    async function appendObjectsToCurrentPage(clipData, offsetX, offsetY) {
      const objects = Array.isArray(clipData) ? clipData : clipData.objects;
      const { PDFDocument, rgb, StandardFonts, PDFName } = PDFLib;
      const doc = state.pdfBytes ? await PDFDocument.load(state.pdfBytes.slice(0), { ignoreEncryption: true }) : await PDFDocument.create();
      
      let sourceIndex = state.pages[state.pageIndex].sourceIndex;
      if (sourceIndex === null || sourceIndex === undefined) {
         const w = state.pages[state.pageIndex].width || state.pageSize.width;
         const h = state.pages[state.pageIndex].height || state.pageSize.height;
         doc.addPage([w, h]);
         sourceIndex = doc.getPageCount() - 1;
         state.pages[state.pageIndex].sourceIndex = sourceIndex;
         state.pages[state.pageIndex].blank = false;
      }
      
      const page = doc.getPage(sourceIndex);
      const h = page.getSize().height;
      const helvetica = await doc.embedFont(StandardFonts.Helvetica);
      
      const rawInjections = [];
      let hasRawCmds = objects.some(o => o.rawCmd);
      const renameMap = new Map();
      const prefix = `Cp${Math.floor(Math.random()*10000)}_`;
      
      if (hasRawCmds && clipData.srcBytes && clipData.srcPageIndex !== undefined) {
          try {
              const srcDoc = await PDFDocument.load(clipData.srcBytes.slice(0), { ignoreEncryption: true });
              const [copiedPage] = await doc.copyPages(srcDoc, [clipData.srcPageIndex]);
              
              const srcRes = copiedPage.node.Resources();
              let targetRes = page.node.Resources();
              
              if (!targetRes && srcRes) {
                  targetRes = doc.context.obj({});
                  page.node.set(PDFName.of("Resources"), targetRes);
              }
              if (srcRes && targetRes) {
                  const keysToMerge = ["Font", "ExtGState", "ColorSpace", "Pattern", "Shading", "XObject", "Properties"];
                  for (const key of keysToMerge) {
                      const srcDict = srcRes.get(PDFName.of(key));
                      if (srcDict) {
                          let targetDict = targetRes.get(PDFName.of(key));
                          if (!targetDict) {
                              targetDict = doc.context.obj({});
                              targetRes.set(PDFName.of(key), targetDict);
                          }
                          const entries = srcDict.entries();
                          for (const [k, v] of entries) {
                              const kStr = k.decodeText();
                              const newKStr = `${prefix}${kStr}`;
                              targetDict.set(PDFName.of(newKStr), v);
                              renameMap.set(`/${kStr}`, `/${newKStr}`);
                          }
                      }
                  }
              }
          } catch(e) { console.warn("Failed to copy source resources to target page:", e); }
      }
      
      for (const item of objects) {
        const finalDomX = item.x + offsetX;
        const finalDomY = item.y + offsetY;
        
        if (item.rawCmd) {
            let finalCmd = item.rawCmd;
            for (const [oldK, newK] of renameMap.entries()) {
                const escaped = oldK.replace(/[/]/g, "\\/");
                const regex = new RegExp(escaped + "(?![a-zA-Z0-9_-])", "g");
                finalCmd = finalCmd.replace(regex, newK);
            }
            const tx = finalDomX - item.origX;
            const ty = -(finalDomY - item.origY);
            rawInjections.push(`q 1 0 0 1 ${num(tx)} ${num(ty)} cm ${finalCmd} Q`);
        } else if (item.type === "image" && item.imageData) {
            const isJpeg = item.imageData.includes("image/jpeg");
            const imgNode = isJpeg ? await doc.embedJpg(item.imageData) : await doc.embedPng(item.imageData);
            page.drawImage(imgNode, { x: finalDomX, y: h - finalDomY - item.h, width: item.w, height: item.h });
        }
      }
      
      if (rawInjections.length > 0) {
          const contentStream = doc.context.flateStream(rawInjections.join("\n"));
          const contentRef = doc.context.register(contentStream);
          page.node.addContentStream(contentRef);
      }
      
      return await doc.save({ useObjectStreams: false });
    }

    async function exportPdf() {
      if (!state.pages.length) return;
      try {
        const { PDFDocument } = PDFLib;
        const outDoc = await PDFDocument.create();
        const srcDoc = state.pdfBytes ? await PDFDocument.load(state.pdfBytes.slice(0), { ignoreEncryption: true }) : null;
        for (const ps of state.pages) {
          if (srcDoc && ps.sourceIndex !== null && ps.sourceIndex !== undefined) {
            const [copied] = await outDoc.copyPages(srcDoc, [ps.sourceIndex]); outDoc.addPage(copied);
          } else outDoc.addPage([ps.width || state.pageSize.width, ps.height || state.pageSize.height]);
        }
        const bytes = await outDoc.save({ useObjectStreams: true });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([bytes], { type: "application/pdf" }));
        const baseName = (state.fileName || "document").replace(/\.[^/.]+$/, "");
        a.download = `${baseName}-modificat.pdf`; a.click();
      } catch (err) { toast("Eroare la export", readableError(err), "error"); }
    }

    async function closeWorkspace() {
      const ok = await confirmBox("Închidere document", "Se va goli memoria și istoricul (Undo) pentru acest fișier. Continui?");
      if (!ok) return;
      await idbClear(STORE.workspace);
      state.fileName = null; state.pdfBytes = null; state.pdfDoc = null; state.pages = []; state.selected.clear();
      els.pdfCanvas.width = 1; els.pdfCanvas.height = 1; els.overlay.innerHTML = ""; els.dropHint.style.display = "grid";
      els.pageWrap.style.width = "0px"; els.pageWrap.style.height = "0px";
      els.stage.style.width = "0px"; els.stage.style.height = "0px";
      updateUi();
    }

    function confirmBox(title, text) {
      return new Promise(resolve => {
        els.confirmTitle.textContent = title; els.confirmText.textContent = text;
        els.confirmModal.classList.add("open");
        const done = (yes) => {
          els.confirmModal.classList.remove("open"); els.confirmOk.removeEventListener("click", ok); els.confirmCancel.removeEventListener("click", cancel);
          resolve(yes);
        };
        const ok = () => done(true), cancel = () => done(false);
        els.confirmOk.addEventListener("click", ok); els.confirmCancel.addEventListener("click", cancel);
      });
    }

    function updateUi() {
      const hasPages = state.pages.length > 0;
      els.pageLabel.textContent = hasPages ? `${state.pageIndex + 1} / ${state.pages.length}` : "No PDF";
      els.prevPage.disabled = !hasPages || state.pageIndex <= 0;
      els.nextPage.disabled = !hasPages || state.pageIndex >= state.pages.length - 1;
      
      els.deletePageMenu.disabled = !hasPages; 
      els.exportMenu.disabled = !hasPages;
      els.undoBtn.disabled = !state.undo.length; 
      els.redoBtn.disabled = !state.redo.length;
      els.deleteSel.disabled = !state.selected.size; 
      els.copySel.disabled = !state.selected.size; 
      
      const selectedImgs = selectedObjects().filter(o => o.type === "image");
      els.toolbarExportImgBtn.style.display = (selectedImgs.length === 1 && state.selected.size === 1) ? "inline-grid" : "none";
      
      let hasClip = false;
      try { hasClip = localStorage.getItem("vector-score-clip-tick") !== null; } catch(e){}
      els.pasteSel.disabled = !hasClip || !hasPages;
      
      els.zoomLabel.textContent = Math.round(state.zoom * 100) + "%";
    }

    function readableError(err) {
      const msg = err && err.message ? err.message : String(err || "Unknown error");
      if (/password|encrypt/i.test(msg)) return "Acest PDF este protejat cu parolă.";
      return msg.length > 160 ? msg.slice(0, 157) + "..." : msg;
    }

    function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }

    boot();
  })();
  </script>
