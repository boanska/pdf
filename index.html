<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vector Score Editor (Precision)</title>
<style>
:root{--bg:#000;--panel:#000;--panel2:#1a1a1a;--ink:#fff;--muted:#a0a0a0;--line:#333;--accent:#fff;--err:#ff6b6b;--paper:#fff;--shadow:0 16px 40px rgba(0,0,0,.5)}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden}
body{font:13px/1.35 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;user-select:none}
button,input{font:inherit;color:inherit}
button,.file-label{height:28px;min-width:28px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:4px;display:inline-grid;place-items:center;padding:0 6px;cursor:pointer}
button:hover,.file-label:hover{background:#333}
button:disabled{opacity:.42;cursor:default}
button.active{color:#000;border-color:#fff;background:#fff}
button.command-ack{background:#fff!important;border-color:#fff!important;color:#000!important;box-shadow:0 0 0 2px rgba(255,255,255,.25)}
#viewport.razor-mode{cursor:url("data:image/svg+xml;utf8,<svg width='24' height='24' viewBox='0 0 24 24' fill='white' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'><g transform='scale(1, -1) translate(0, -24) rotate(-45 12 12)'><rect x='3' y='6' width='18' height='12' rx='2' ry='2'/><line x1='7' y1='12' x2='17' y2='12'/><line x1='12' y1='9' x2='12' y2='15'/><circle cx='12' cy='12' r='1.5' fill='black'/></g></svg>") 2 2, crosshair!important}
#viewport.razor-mode .sel-box{cursor:inherit!important;pointer-events:auto}
#viewport.razor-mode *{cursor:inherit!important}
#app{height:100%;display:grid;grid-template-rows:auto 1fr}
.toolbar{display:flex;align-items:center;gap:clamp(4px,1.5vw,12px);padding:4px 6px;background:var(--panel);border-bottom:1px solid #15181d;flex-wrap:wrap;position:relative;z-index:20}
.group{display:flex;align-items:center;gap:3px;padding-right:clamp(4px,1.5vw,12px);border-right:1px solid var(--line);flex:0 0 auto}
.group:last-child{border-right:0}
.page-indicator{min-width:60px;text-align:center;color:var(--muted)}
.hidden-input{position:absolute;left:-9999px;width:1px;height:1px;opacity:0}
.dropdown{position:absolute;top:100%;left:0;margin-top:4px;width:180px;background:var(--panel);border:1px solid var(--line);border-radius:6px;box-shadow:var(--shadow);padding:4px;display:none;z-index:100}
.dropdown.open{display:block}
.drop-row{width:100%;height:28px;display:flex;justify-content:space-between;align-items:center;border:0;background:transparent;border-radius:4px;padding:0 8px}
.drop-row:hover{background:var(--panel2)}
#workspace{position:relative;overflow:hidden;background:#111419}
#viewport{position:absolute;inset:0;overflow:auto;touch-action:pan-x pan-y;scrollbar-width:thin;scrollbar-color:#4a5361 #111419}
#viewport::-webkit-scrollbar{width:16px;height:16px}
#viewport::-webkit-scrollbar-track{background:#111419}
#viewport::-webkit-scrollbar-thumb{background:#4a5361;border-radius:8px;border:4px solid #111419}
#viewport::-webkit-scrollbar-thumb:hover{background:#616c7e}
#viewport::-webkit-scrollbar-corner{background:#111419}
#stage{position:relative;overflow:hidden}
#pageWrap{position:absolute;left:0;top:0;background:var(--paper);box-shadow:0 12px 40px rgba(0,0,0,.45);transform-origin:0 0}
#pdfCanvas,#overlay{position:absolute;left:0;top:0;width:100%;height:100%}
#overlay{overflow:visible;touch-action:none;--inv-z:1}
.obj{vector-effect:non-scaling-stroke;pointer-events:all;stroke-width:0}
.obj.deleted{display:none}
.bbox{fill:rgba(0,0,0,0.001);stroke:#fff;stroke-width:calc(1px * var(--inv-z));stroke-dasharray:calc(4px * var(--inv-z));pointer-events:all;animation:march 0.6s linear infinite;cursor:move;mix-blend-mode:difference}
@keyframes march{to{stroke-dashoffset:calc(-8px * var(--inv-z))}}
.selection-rect{fill:none;stroke:#fff;stroke-width:calc(1px * var(--inv-z));stroke-dasharray:calc(3px * var(--inv-z));mix-blend-mode:difference}
.handle{fill:#fff;stroke:none;pointer-events:all;mix-blend-mode:difference}
#dpad{position:absolute;right:24px;bottom:24px;width:120px;height:120px;z-index:10;display:none;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:50%;box-shadow:var(--shadow);overflow:hidden;transform:rotate(45deg)}
#dpad.open{display:grid}
#dpad button{width:100%;height:100%;padding:0;border:none;border-radius:0;background:rgba(32,37,45,.92);backdrop-filter:blur(4px);touch-action:manipulation}
#dpad button:hover,#dpad button:active{background:var(--panel2)}
#dpad button span{display:grid;place-items:center;width:100%;height:100%;transform:rotate(-45deg);font-size:20px;font-weight:bold}
#dropHint{position:absolute;inset:26px;border:2px dashed rgba(255,255,255,.28);border-radius:10px;display:grid;place-items:center;color:var(--muted);font-size:16px;pointer-events:none}
#toasts{position:fixed;right:14px;top:48px;z-index:100;display:grid;gap:8px;width:min(360px,calc(100vw - 28px));pointer-events:none}
.toast{border-left:4px solid var(--err);background:rgba(35,40,48,.96);color:var(--ink);box-shadow:var(--shadow);border-radius:7px;padding:10px 12px;animation:toast-in .16s ease-out both}
.toast-title{font-weight:700;margin-bottom:2px}
.toast-body{color:var(--muted)}
@keyframes toast-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;place-items:center;z-index:90}
.modal-backdrop.open{display:grid}
.modal{width:min(560px,calc(100vw - 28px));background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:18px}
.modal h2{margin:0 0 8px;font-size:18px}
.modal p{color:var(--muted);margin:0 0 14px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
@media (max-width:720px){#dpad{right:10px;bottom:10px}}
</style>
</head>
<body>
<div id="app">
<div class="toolbar">
<div class="group" style="position:relative;">
<button id="fileMenuButton" style="padding:0 8px;" title="File Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></button>
<div id="fileMenu" class="dropdown" role="menu">
<button class="drop-row" id="openMenu">Open PDF <span>Ctrl+O</span></button>
<button class="drop-row" id="exportMenu">Export PDF <span>Ctrl+S</span></button>
<button class="drop-row" id="exportRangeMenu">Export Range...</button>
<div style="height:1px;background:var(--line);margin:4px 0;"></div>
<button class="drop-row" id="addPageMenu">Add Blank Page</button>
<button class="drop-row" id="deletePageMenu">Delete Page</button>
<div style="height:1px;background:var(--line);margin:4px 0;"></div>
<button class="drop-row" id="closeMenu">Close</button>
</div>
</div>
<div class="group">
<button id="zoomOut" title="Zoom out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg></button>
<span id="zoomLabel" class="page-indicator">100%</span>
<button id="zoomIn" title="Zoom in"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg></button>
</div>
<div class="group">
<button id="prevPage" title="Previous page"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
<span id="pageLabel" class="page-indicator">No PDF</span>
<button id="nextPage" title="Next page"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
</div>
<div class="group">
<button id="undoBtn" title="Undo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg></button>
<button id="redoBtn" title="Redo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg></button>
</div>
<div class="group">
<button id="deleteSel" title="Delete selected objects">Delete</button>
<button id="copySel" title="Copy selected objects">Copy</button>
<button id="pasteSel" title="Paste copied objects">Paste</button>
</div>
<div class="group">
<button id="razorBtn" title="Razor: Click objects to immediately delete them"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><g transform="scale(1, -1) translate(0, -24) rotate(-45 12 12)"><rect x="3" y="6" width="18" height="12" rx="2" ry="2"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="12" y1="9" x2="12" y2="15"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></g></svg></button>
</div>
<div class="group">
<button id="toggleDpadBtn" title="Toggle On-Screen D-Pad"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg></button>
</div>
<div class="group">
<button id="toolbarExportImgBtn" title="Export Image" style="display:none;background:#2f363f;border-color:#5d6b7d;">Export Image</button>
</div>
<input class="hidden-input" id="pdfInput" type="file" accept="application/pdf,.pdf">
</div>
<main id="workspace">
<div id="viewport">
<div id="stage">
<div id="pageWrap">
<canvas id="pdfCanvas"></canvas>
<svg id="overlay"></svg>
</div>
</div>
</div>
<div id="dropHint">Open or drop a PDF score to begin</div>
<div id="dpad" aria-label="Nudge selected objects">
<button data-nudge="0,-1" title="Nudge up"><span>↑</span></button>
<button data-nudge="1,0" title="Nudge right"><span>→</span></button>
<button data-nudge="-1,0" title="Nudge left"><span>←</span></button>
<button data-nudge="0,1" title="Nudge down"><span>↓</span></button>
</div>
<div id="contextMenu" class="dropdown" style="position:fixed;z-index:200;width:160px;">
<button class="drop-row" id="ctxCopy">Copy</button>
<button class="drop-row" id="ctxPaste">Paste</button>
<button class="drop-row" id="ctxDelete">Delete</button>
<div style="height:1px;background:var(--line);margin:4px 0;" id="ctxImgDivider"></div>
<button class="drop-row" id="ctxExportImg">Export Image</button>
</div>
</main>
</div>
<div id="toasts"></div>
<div id="confirmModal" class="modal-backdrop">
<div class="modal">
<h2 id="confirmTitle">Confirm</h2>
<p id="confirmText"></p>
<div class="modal-actions">
<button id="confirmCancel">Cancel</button>
<button id="confirmOk">OK</button>
</div>
</div>
</div>
<div id="exportRangeModal" class="modal-backdrop">
<div class="modal">
<h2>Export Page Range</h2>
<p>Enter the page range you want to export (1-indexed):</p>
<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;">
<label>From:</label>
<input type="number" id="exportStartNum" min="1" style="width:80px;padding:4px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;" value="1">
<label>To:</label>
<input type="number" id="exportEndNum" min="1" style="width:80px;padding:4px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:4px;">
</div>
<div class="modal-actions">
<button id="exportRangeCancel">Cancel</button>
<button id="exportRangeOk">Export</button>
</div>
</div>
</div>
<script src="/src/editor.js"></script>
</body>
</html>
