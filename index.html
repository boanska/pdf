<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Vector Score Editor (Precision)</title>
  <style>
    :root {
      --bg: #000000;
      --panel: #000000;
      --panel2: #1a1a1a;
      --ink: #ffffff;
      --muted: #a0a0a0;
      --line: #333333;
      --accent: #ffffff;
      --err: #ff6b6b;
      --paper: #ffffff;
      --shadow: 0 16px 40px rgba(0,0,0,.5);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    
    body {
      font: 13px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button, input { font: inherit; color: inherit; }

    button, .file-label {
      height: 28px;
      min-width: 28px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--ink);
      border-radius: 4px;
      display: inline-grid;
      place-items: center;
      padding: 0 6px;
      cursor: pointer;
    }

    button:hover, .file-label:hover { background: #333333; }
    button:disabled { opacity: .42; cursor: default; }
    button.active { color: #000; border-color: #ffffff; background: #ffffff; }
    button.command-ack {
      background: #ffffff !important;
      border-color: #ffffff !important;
      color: #000000 !important;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, .25);
    }
    
    #viewport.razor-mode { cursor: url("data:image/svg+xml;utf8,<svg width='24' height='24' viewBox='0 0 24 24' fill='white' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'><g transform='scale(1, -1) translate(0, -24) rotate(-45 12 12)'><rect x='3' y='6' width='18' height='12' rx='2' ry='2'/><line x1='7' y1='12' x2='17' y2='12'/><line x1='12' y1='9' x2='12' y2='15'/><circle cx='12' cy='12' r='1.5' fill='black'/></g></svg>") 2 2, crosshair !important; }
    #viewport.razor-mode .sel-box { cursor: inherit !important; pointer-events: auto; }
    #viewport.razor-mode * { cursor: inherit !important; }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: clamp(4px, 1.5vw, 12px);
      padding: 4px 6px;
      background: var(--panel);
      border-bottom: 1px solid #15181d;
      flex-wrap: wrap; 
      position: relative;
      z-index: 20;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 3px;
      padding-right: clamp(4px, 1.5vw, 12px);
      border-right: 1px solid var(--line);
      flex: 0 0 auto;
    }
    .group:last-child { border-right: 0; }
    .page-indicator { min-width: 60px; text-align: center; color: var(--muted); }
    .hidden-input { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      width: 180px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: var(--shadow);
      padding: 4px;
      display: none;
      z-index: 100;
    }
    .dropdown.open { display: block; }
    .drop-row {
      width: 100%;
      height: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 0;
      background: transparent;
      border-radius: 4px;
      padding: 0 8px;
    }
    .drop-row:hover { background: var(--panel2); }

    #workspace {
      position: relative;
      overflow: hidden;
      background: #111419;
    }

    #viewport {
      position: absolute;
      inset: 0;
      overflow: auto;
      touch-action: pan-x pan-y;
      scrollbar-width: thin; 
      scrollbar-color: #4a5361 #111419;
    }
    
    #viewport::-webkit-scrollbar { width: 16px; height: 16px; }
    #viewport::-webkit-scrollbar-track { background: #111419; }
    #viewport::-webkit-scrollbar-thumb { 
        background: #4a5361; 
        border-radius: 8px; 
        border: 4px solid #111419; 
    }
    #viewport::-webkit-scrollbar-thumb:hover { background: #616c7e; }
    #viewport::-webkit-scrollbar-corner { background: #111419; }

    #stage {
      position: relative;
      overflow: hidden;
    }

    #pageWrap {
      position: absolute;
      left: 0;
      top: 0;
      background: var(--paper);
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      transform-origin: 0 0;
    }

    #pdfCanvas, #overlay {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    #overlay { overflow: visible; touch-action: none; --inv-z: 1; }
    
    .obj { vector-effect: non-scaling-stroke; pointer-events: all; stroke-width: 0; }
    .obj.deleted { display: none; }
    
    .bbox {
      fill: rgba(0, 0, 0, 0.001);
      stroke: #fff;
      stroke-width: calc(1px * var(--inv-z));
      stroke-dasharray: calc(4px * var(--inv-z));
      pointer-events: all;
      animation: march 0.6s linear infinite;
      cursor: move;
      mix-blend-mode: difference;
    }
    @keyframes march {
      to { stroke-dashoffset: calc(-8px * var(--inv-z)); }
    }
    
    .selection-rect {
      fill: none;
      stroke: #fff;
      stroke-width: calc(1px * var(--inv-z));
      stroke-dasharray: calc(3px * var(--inv-z));
      mix-blend-mode: difference;
    }
    
    .handle {
      fill: #fff;
      stroke: none;
      pointer-events: all;
      mix-blend-mode: difference;
    }

    #dpad {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 120px;
      height: 120px;
      z-index: 10;
      display: none;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: rotate(45deg);
    }
    #dpad.open { display: grid; }
    
    #dpad button {
      width: 100%; height: 100%;
      padding: 0;
      border: none; border-radius: 0;
      background: rgba(32,37,45,.92);
      backdrop-filter: blur(4px);
      touch-action: manipulation;
    }
    #dpad button:hover, #dpad button:active { background: var(--panel2); }
    #dpad button span {
      display: grid;
      place-items: center;
      width: 100%; height: 100%;
      transform: rotate(-45deg);
      font-size: 20px;
      font-weight: bold;
    }

    #dropHint {
      position: absolute;
      inset: 26px;
      border: 2px dashed rgba(255,255,255,.28);
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    #toasts {
      position: fixed;
      right: 14px;
      top: 48px;
      z-index: 100;
      display: grid;
      gap: 8px;
      width: min(360px, calc(100vw - 28px));
      pointer-events: none;
    }
    .toast {
      border-left: 4px solid var(--err);
      background: rgba(35,40,48,.96);
      color: var(--ink);
      box-shadow: var(--shadow);
      border-radius: 7px;
      padding: 10px 12px;
      animation: toast-in .16s ease-out both;
    }
    .toast-title { font-weight: 700; margin-bottom: 2px; }
    .toast-body { color: var(--muted); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.48);
      display: none;
      place-items: center;
      z-index: 90;
    }
    .modal-backdrop.open { display: grid; }
    .modal {
      width: min(560px, calc(100vw - 28px));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .modal h2 { margin: 0 0 8px; font-size: 18px; }
    .modal p { color: var(--muted); margin: 0 0 14px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }

    @media (max-width: 720px) {
      #dpad { right: 10px; bottom: 10px; }
    }
  </style>
</head>
<body>
  <div id="app">
    
    <div class="toolbar">
      <div class="group" style="position: relative;">
        <button id="fileMenuButton" style="padding: 0 8px;" title="File Menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </button>
        <div id="fileMenu" class="dropdown" role="menu">
          <button class="drop-row" id="openMenu">Open PDF <span>Ctrl+O</span></button>
          <button class="drop-row" id="exportMenu">Export PDF <span>Ctrl+S</span></button>
          <div style="height: 1px; background: var(--line); margin: 4px 0;"></div>
          <button class="drop-row" id="addPageMenu">Add Blank Page</button>
          <button class="drop-row" id="deletePageMenu">Delete Page</button>
          <div style="height: 1px; background: var(--line); margin: 4px 0;"></div>
          <button class="drop-row" id="closeMenu">Close</button>
        </div>
      </div>
      
      <div class="group">
        <button id="zoomOut" title="Zoom out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <span id="zoomLabel" class="page-indicator">100%</span>
        <button id="zoomIn" title="Zoom in">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
      </div>
      <div class="group">
        <button id="prevPage" title="Previous page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span id="pageLabel" class="page-indicator">No PDF</span>
        <button id="nextPage" title="Next page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <div class="group">
        <button id="undoBtn" title="Undo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
        </button>
        <button id="redoBtn" title="Redo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg>
        </button>
      </div>
      <div class="group">
        <button id="deleteSel" title="Delete selected objects">Delete</button>
        <button id="copySel" title="Copy selected objects">Copy</button>
        <button id="pasteSel" title="Paste copied objects">Paste</button>
      </div>
      
      <div class="group">
        <button id="razorBtn" title="Razor: Click objects to immediately delete them">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <g transform="scale(1, -1) translate(0, -24) rotate(-45 12 12)">
              <rect x="3" y="6" width="18" height="12" rx="2" ry="2"/>
              <line x1="7" y1="12" x2="17" y2="12"/>
              <line x1="12" y1="9" x2="12" y2="15"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </g>
          </svg>
        </button>
      </div>
      
      <div class="group">
        <button id="toggleDpadBtn" title="Toggle On-Screen D-Pad">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
        </button>
      </div>
      
      <div class="group">
        <button id="toolbarExportImgBtn" title="Descarcă imaginea originală" style="display: none; background: #2f363f; border-color: #5d6b7d;">Export Image</button>
      </div>

      <input class="hidden-input" id="pdfInput" type="file" accept="application/pdf,.pdf">
    </div>

    <main id="workspace">
      <div id="viewport">
        <div id="stage">
          <div id="pageWrap">
            <canvas id="pdfCanvas"></canvas>
            <svg id="overlay"></svg>
          </div>
        </div>
      </div>
      <div id="dropHint">Open or drop a PDF score to begin</div>
      
      <div id="dpad" aria-label="Nudge selected objects">
        <button data-nudge="0,-1" title="Nudge up"><span>↑</span></button>
        <button data-nudge="1,0" title="Nudge right"><span>→</span></button>
        <button data-nudge="-1,0" title="Nudge left"><span>←</span></button>
        <button data-nudge="0,1" title="Nudge down"><span>↓</span></button>
      </div>

      <div id="contextMenu" class="dropdown" style="position: fixed; z-index: 200; width: 160px;">
        <button class="drop-row" id="ctxCopy">Copy</button>
        <button class="drop-row" id="ctxPaste">Paste</button>
        <button class="drop-row" id="ctxDelete">Delete</button>
        <div style="height: 1px; background: var(--line); margin: 4px 0;" id="ctxImgDivider"></div>
        <button class="drop-row" id="ctxExportImg">Export Image</button>
      </div>
    </main>
  </div>

  <div id="toasts"></div>
  <div id="confirmModal" class="modal-backdrop">
    <div class="modal">
      <h2 id="confirmTitle">Confirm</h2>
      <p id="confirmText"></p>
      <div class="modal-actions">
        <button id="confirmCancel">Cancel</button>
        <button id="confirmOk">OK</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    "use strict";

    const CDN = {
      pdfjs: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js",
      worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js",
      pdfLib: "https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js",
      pako: "https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"
    };

    const DB_NAME = "vector-score-pdf-editor-light-v9";
    const STORE = { workspace: "workspace" };
    const $ = (id) => document.getElementById(id);
    
    const els = {
      fileMenuButton: $("fileMenuButton"), fileMenu: $("fileMenu"),
      openMenu: $("openMenu"), exportMenu: $("exportMenu"), closeMenu: $("closeMenu"),
      addPageMenu: $("addPageMenu"), deletePageMenu: $("deletePageMenu"),
      toggleDpadBtn: $("toggleDpadBtn"), dpad: $("dpad"),
      toolbarExportImgBtn: $("toolbarExportImgBtn"),
      contextMenu: $("contextMenu"), ctxCopy: $("ctxCopy"), ctxPaste: $("ctxPaste"), 
      ctxDelete: $("ctxDelete"), ctxExportImg: $("ctxExportImg"), ctxImgDivider: $("ctxImgDivider"),
      pdfInput: $("pdfInput"), viewport: $("viewport"), stage: $("stage"),
      pageWrap: $("pageWrap"), pdfCanvas: $("pdfCanvas"), overlay: $("overlay"),
      dropHint: $("dropHint"), 
      pageLabel: $("pageLabel"), zoomLabel: $("zoomLabel"), zoomIn: $("zoomIn"), zoomOut: $("zoomOut"),
      prevPage: $("prevPage"), nextPage: $("nextPage"),
      undoBtn: $("undoBtn"), redoBtn: $("redoBtn"), deleteSel: $("deleteSel"), copySel: $("copySel"), pasteSel: $("pasteSel"),
      toasts: $("toasts"), 
      confirmModal: $("confirmModal"), confirmTitle: $("confirmTitle"), confirmText: $("confirmText"),
      confirmCancel: $("confirmCancel"), confirmOk: $("confirmOk"),
      razorBtn: $("razorBtn")
    };

    const state = {
      db: null,
      fileName: null,
      pdfBytes: null,
      pdfDoc: null,
      pageCount: 0,
      pageIndex: 0,
      pageSize: { width: 612, height: 792 },
      zoom: 1,
      lastRenderedZoom: 1,
      scroll: { left: 0, top: 0 },
      renderToken: 0,
      renderTimeout: null,
      razorMode: false,
      pages: [],
      selected: new Set(),
      undo: [],
      redo: [],
      activePointers: new Map(),
      gesture: null,
      drag: null,
      saving: false,
      ctxTargetImg: null,
      ctxTargetPos: null,
      commandAckTimers: new Map(),
      overlayFrame: 0
    };

    let nudgeTimeout = null;
    let dpadInitialDelayTimeout = null;
    let autoNudgeInterval = null;

    function toast(title, body = "", type = "success", timeout = 6000) {
      if (type !== "error") return; 
      const node = document.createElement("div");
      node.className = "toast";
      node.innerHTML = `<div class="toast-title">${escapeHtml(title)}</div>${body ? `<div class="toast-body">${escapeHtml(body)}</div>` : ""}`;
      els.toasts.appendChild(node);
      setTimeout(() => {
        node.style.opacity = "0";
        node.style.transform = "translateY(-6px)";
        setTimeout(() => node.remove(), 180);
      }, timeout);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }[c]));
    }

    function num(n) { return Number(n).toFixed(6).replace(/\.?0+$/, "") || "0"; }

    function flashCommand(buttons, hold = 650) {
      const list = Array.isArray(buttons) ? buttons : [buttons];
      for (const btn of list) {
        if (!btn) continue;
        btn.classList.add("command-ack");
        clearTimeout(state.commandAckTimers.get(btn));
        const timer = setTimeout(() => {
          btn.classList.remove("command-ack");
          state.commandAckTimers.delete(btn);
        }, hold);
        state.commandAckTimers.set(btn, timer);
      }
    }

    async function runCommand(buttons, fn) {
      flashCommand(buttons);
      try {
        return await fn();
      } finally {
        setTimeout(() => updateUi(), 0);
      }
    }

    function pickNewestMatchingObjects(pageObjects, expected, tolerance = 3.0) {
      const selected = [];
      const used = new Set();
      for (const exp of expected) {
        let bestIndex = -1;
        let bestDiff = Infinity;
        for (let i = pageObjects.length - 1; i >= 0; i--) {
          if (used.has(i)) continue;
          const o = pageObjects[i];
          if (o.deleted || o.type !== exp.type) continue;
          const diffX = Math.abs(o.x - exp.x);
          const diffY = Math.abs(o.y - exp.y);
          const diffW = o.type === "text" ? 0 : Math.abs(o.w - exp.w);
          const diffH = o.type === "text" ? 0 : Math.abs(o.h - exp.h);
          if (diffX < tolerance && diffY < tolerance && diffW < tolerance && diffH < tolerance) {
            const totalDiff = diffX + diffY + diffW + diffH;
            if (totalDiff < bestDiff) {
              bestDiff = totalDiff;
              bestIndex = i;
            }
          }
        }
        if (bestIndex >= 0) {
          used.add(bestIndex);
          selected.push(pageObjects[bestIndex].id);
        }
      }
      return selected;
    }

    async function boot() {
      try {
        await openDb();
        await loadLibraries();
        bindEvents();
        await restoreWorkspace();
        updateUi();
      } catch (err) {
        toast("Startup failed", readableError(err), "error");
      }
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE.workspace)) db.createObjectStore(STORE.workspace);
        };
        req.onsuccess = () => { state.db = req.result; resolve(); };
        req.onerror = () => reject(req.error);
      });
    }

    function idbGet(store, key) {
      return new Promise((resolve, reject) => {
        const tx = state.db.transaction(store, "readonly");
        const req = tx.objectStore(store).get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function idbPut(store, value, key) {
      return new Promise((resolve, reject) => {
        const tx = state.db.transaction(store, "readwrite");
        const req = key === undefined ? tx.objectStore(store).put(value) : tx.objectStore(store).put(value, key);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function idbClear(store) {
      return new Promise((resolve, reject) => {
        const tx = state.db.transaction(store, "readwrite");
        const req = tx.objectStore(store).clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    async function loadLibraries() {
      await loadScript(CDN.pdfjs, "pdfjsLib");
      pdfjsLib.GlobalWorkerOptions.workerSrc = CDN.worker;
      await loadScript(CDN.pdfLib, "PDFLib");
      await loadScript(CDN.pako, "pako");
    }

    function loadScript(src, globalName) {
      return new Promise((resolve, reject) => {
        if (window[globalName]) return resolve();
        const s = document.createElement("script");
        s.src = src;
        s.async = true;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Could not load ${src}`));
        document.head.appendChild(s);
      });
    }

    async function restoreWorkspace() {
      const saved = await idbGet(STORE.workspace, "active");
      if (!saved || !saved.pdfBytes) return;
      state.fileName = saved.fileName || "Document";
      state.pdfBytes = saved.pdfBytes;
      state.pages = saved.pages || [];
      state.pageIndex = Math.min(saved.pageIndex || 0, Math.max(0, state.pages.length - 1));
      state.zoom = saved.zoom || 1;
      
      if (saved.scroll) state.scroll = saved.scroll;
      
      state.undo = saved.undo || [];
      state.redo = saved.redo || [];
      state.lastRenderedZoom = state.zoom;
      await loadPdf(state.pdfBytes, false, false);
      
      els.viewport.scrollLeft = state.scroll.left;
      els.viewport.scrollTop = state.scroll.top;
    }

    async function persistWorkspace() {
      if (state.saving || !state.pdfBytes) return;
      state.saving = true;
      try {
        const payload = {
          fileName: state.fileName,
          pdfBytes: state.pdfBytes,
          pages: state.pages,
          pageIndex: state.pageIndex,
          zoom: state.zoom,
          scroll: { left: els.viewport.scrollLeft, top: els.viewport.scrollTop },
          undo: state.undo.slice(-35),
          redo: state.redo.slice(-35),
          savedAt: Date.now()
        };
        await idbPut(STORE.workspace, payload, "active");
      } catch (err) {
        console.error("Autosave error:", err);
      } finally {
        state.saving = false;
      }
    }

    function snapshot() {
      return {
        pdfBytes: state.pdfBytes ? new Uint8Array(state.pdfBytes) : null,
        pages: structuredClone(state.pages),
        pageIndex: state.pageIndex,
        zoom: state.zoom,
        scroll: { left: els.viewport.scrollLeft, top: els.viewport.scrollTop }
      };
    }

    function restoreSnapshot(snap) {
      const data = typeof snap === "string" ? JSON.parse(snap) : snap;
      if (data.pdfBytes) state.pdfBytes = new Uint8Array(data.pdfBytes);
      state.pages = data.pages;
      state.pageIndex = data.pageIndex;
      state.zoom = data.zoom;
      state.selected.clear();
      
      if (state.pdfBytes) {
        loadPdf(state.pdfBytes, false, false).then(() => {
           if (data.scroll) { els.viewport.scrollLeft = data.scroll.left; els.viewport.scrollTop = data.scroll.top; }
        });
      } else {
        renderPage(false);
      }
      persistWorkspace();
    }

    function pushUndo() {
      if (!state.pdfBytes) return;
      state.undo.push(snapshot());
      if (state.undo.length > 35) state.undo.shift();
      state.redo = [];
      updateUi();
    }

    async function loadPdf(bytes, initializePages = true, keepSelection = false) {
      state.pdfDoc = await pdfjsLib.getDocument({ data: bytes.slice(0), useWorkerFetch: true }).promise;
      state.pageCount = state.pdfDoc.numPages;
      if (initializePages || !state.pages.length) {
        state.pages = Array.from({ length: state.pageCount }, (_, i) => ({ sourceIndex: i, objects: [], overlays: [], blank: false }));
        state.pageIndex = 0;
      }
      while (state.pages.length < state.pageCount) {
        state.pages.push({ sourceIndex: state.pages.length, objects: [], overlays: [], blank: false });
      }
      await ensurePageObjects(state.pageIndex);
      await renderPage(keepSelection);
      els.dropHint.style.display = "none";
      persistWorkspace();
    }

    async function openPdfFile(file) {
      if (!file) return;
      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        state.fileName = file.name;
        state.pdfBytes = bytes;
        state.selected.clear();
        state.undo = [];
        state.redo = [];
        await loadPdf(bytes, true, false);
      } catch (err) {
        toast("Eroare", "Fișier corupt sau protejat.", "error");
      }
    }

    async function ensurePageObjects(pageIndex) {
      const pageState = state.pages[pageIndex];
      if (!pageState || pageState.objects.length || pageState.blank) return;
      try {
        const sourceIndex = pageState.sourceIndex ?? pageIndex;
        const page = await state.pdfDoc.getPage(sourceIndex + 1);
        const viewport = page.getViewport({ scale: 1 });
        state.pageSize = { width: viewport.width, height: viewport.height };
        
        const textObjects = await extractTextObjects(page, viewport);
        const vectorObjects = await extractExactVectorsFromStream(pageIndex); 
        
        pageState.objects = textObjects.concat(vectorObjects);
      } catch (err) {
        console.warn("Analysis parsing issues:", err);
      }
    }

    async function extractTextObjects(page, viewport) {
      const content = await page.getTextContent({ includeMarkedContent: true, disableCombineTextItems: true });
      return content.items.filter(it => it.str && it.str.trim()).map((it, i) => {
        const tx = pdfjsLib.Util.transform(viewport.transform, it.transform);
        const fontSize = Math.hypot(tx[2], tx[3]) || 10;
        
        const isStandardText = /^[\x20-\x7F]*$/.test(it.str);
        
        const rawW = it.width || (it.str.length * fontSize * 0.5);
        const w = Math.min(rawW, fontSize * 15);
        const rawH = isStandardText ? fontSize : (fontSize * 0.35);
        const h = Math.min(rawH, fontSize * 5);
        
        const x = tx[4];
        const y = tx[5] - (isStandardText ? h * 0.8 : h * 0.7);

        return {
          id: `p${state.pageIndex}-t${i}`,
          type: "text", text: it.str,
          x, y, w: Math.max(0.5, w), h: Math.max(0.5, h), fontSize,
          dx: 0, dy: 0, sx: 1, sy: 1, deleted: false,
          rawX: it.transform[4], rawY: it.transform[5]
        };
      });
    }

    async function extractExactVectorsFromStream(pageIndex) {
      const { PDFDocument, PDFName, PDFArray } = PDFLib;
      const pdfDoc = await PDFDocument.load(state.pdfBytes.slice(0), { ignoreEncryption: true });
      const sourceIndex = state.pages[pageIndex]?.sourceIndex ?? pageIndex;
      const pdfPage = pdfDoc.getPage(sourceIndex);
      const pageHeight = pdfPage.getSize().height;

      const contents = pdfPage.node.Contents();
      if (!contents) return [];
      
      const refs = [];
      if (contents instanceof PDFArray) { 
          for(let i=0; i<contents.size(); i++) refs.push(pdfDoc.context.lookup(contents.get(i))); 
      } else refs.push(pdfDoc.context.lookup(contents));

      let text = "";
      for (const stream of refs) {
         const bytes = stream.getContents ? stream.getContents() : stream.contents;
         if (!bytes) continue;
         const filter = stream.dict?.get?.(PDFName.of("Filter"))?.toString() || "";
         let s = ""; 
         const arr = /FlateDecode/.test(filter) ? pako.inflate(bytes) : bytes;
         for(let i=0; i<arr.length; i+=0x8000) s += String.fromCharCode.apply(null, arr.subarray(i, i+0x8000));
         text += s + "\n";
      }

      const tokens = tokenizePdfContent(text);
      return parseVectorObjects(tokens, pageHeight, pageIndex);
    }

    function parseVectorObjects(tokens, pageHeight, pageIndex) {
        const objects = [];
        let ctm = [1,0,0,1,0,0];
        const stack = [];
        let currentPath = [];

        for(let i=0; i<tokens.length; i++) {
            const op = tokens[i].value;
            if (op === "q") stack.push(ctm.slice());
            else if (op === "Q") { const p = stack.pop(); if (p) ctm = p; }
            else if (op === "cm") { const m = numbersBefore(tokens, i, 6); if (m) ctm = multiplyMatrix(ctm, m); }
            else if (op === "Do") {
                const n = tokens[i-1]?.value;
                if (n && n.startsWith("/")) {
                    const pt1 = applyMatrix(ctm, 0, 0);
                    const pt2 = applyMatrix(ctm, 1, 1);
                    const minX = Math.min(pt1.x, pt2.x);
                    const minY = Math.min(pt1.y, pt2.y);
                    const maxX = Math.max(pt1.x, pt2.x);
                    const maxY = Math.max(pt1.y, pt2.y);
                    
                    objects.push({
                        id: `p${pageIndex}-img${objects.length}`,
                        type: "image",
                        name: n.substring(1),
                        x: minX, y: pageHeight - maxY,
                        w: Math.max(0.2, maxX - minX), h: Math.max(0.2, maxY - minY),
                        dx: 0, dy: 0, sx: 1, sy: 1, deleted: false
                    });
                }
            }
            else if (op === "re") {
                const n = numbersBefore(tokens, i, 4);
                if (n) {
                    const p1 = applyMatrix(ctm, n[0], n[1]);
                    const p2 = applyMatrix(ctm, n[0]+n[2], n[1]+n[3]);
                    const minX = Math.min(p1.x, p2.x), minY = Math.min(p1.y, p2.y);
                    const maxX = Math.max(p1.x, p2.x), maxY = Math.max(p1.y, p2.y);
                    objects.push({
                        id: `p${pageIndex}-v${objects.length}`, 
                        type: "re",
                        x: minX, y: pageHeight - maxY, 
                        w: Math.max(0.2, maxX - minX), h: Math.max(0.2, maxY - minY),
                        dx: 0, dy: 0, sx: 1, sy: 1, deleted: false
                    });
                }
            }
            else if (op === "m" || op === "l" || op === "c" || op === "v" || op === "y") {
                let count = 2; if(op==="c") count=6; else if(op==="v"||op==="y") count=4;
                const n = numbersBefore(tokens, i, count);
                if (n) currentPath.push({ op, orig: n, ctm: ctm.slice() });
            }
            else if (["S", "s", "f", "F", "B", "b"].includes(op)) {
                if (currentPath.length > 0) {
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    for(const cmd of currentPath) {
                        for(let j=0; j<cmd.orig.length; j+=2) {
                            const pt = applyMatrix(cmd.ctm, cmd.orig[j], cmd.orig[j+1]);
                            minX = Math.min(minX, pt.x); minY = Math.min(minY, pt.y);
                            maxX = Math.max(maxX, pt.x); maxY = Math.max(maxY, pt.y);
                        }
                    }
                    if (minX !== Infinity) {
                        objects.push({
                            id: `p${pageIndex}-v${objects.length}`, 
                            type: "path",
                            x: minX, y: pageHeight - maxY, 
                            w: Math.max(0.2, maxX - minX), h: Math.max(0.2, maxY - minY),
                            dx: 0, dy: 0, sx: 1, sy: 1, deleted: false
                        });
                    }
                    currentPath = [];
                }
            }
            else if (op === "n") { currentPath = []; }
        }
        return objects;
    }

    async function renderPage(keepSelection = false) {
      const token = ++state.renderToken;
      if (!keepSelection) state.selected.clear();
      if (!state.pdfDoc && !state.pages[state.pageIndex]?.blank) return;
      
      const pageState = state.pages[state.pageIndex];
      if (!pageState.blank) await ensurePageObjects(state.pageIndex);
      const ctx = els.pdfCanvas.getContext("2d");
      
      let width = state.pageSize.width, height = state.pageSize.height;

      if (!pageState.blank) {
        const sourceIndex = pageState.sourceIndex ?? state.pageIndex;
        const page = await state.pdfDoc.getPage(sourceIndex + 1);
        const baseViewport = page.getViewport({ scale: 1 });
        width = baseViewport.width; height = baseViewport.height;
        state.pageSize = { width, height };
      } else {
        width = pageState.width || 612; height = pageState.height || 792;
        state.pageSize = { width, height };
      }

      const res = window.devicePixelRatio || 1;
      let renderScale = Math.max(1.5, state.zoom) * Math.min(2, res);
      
      const MAX_CANVAS_DIM = 12000;
      if (width * renderScale > MAX_CANVAS_DIM) renderScale = MAX_CANVAS_DIM / width;
      if (height * renderScale > MAX_CANVAS_DIM) renderScale = Math.min(renderScale, MAX_CANVAS_DIM / height);

      if (pageState.blank) {
        els.pdfCanvas.width = Math.floor(width * renderScale);
        els.pdfCanvas.height = Math.floor(height * renderScale);
        ctx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, width, height);
      } else {
        const sourceIndex = pageState.sourceIndex ?? state.pageIndex;
        const page = await state.pdfDoc.getPage(sourceIndex + 1);
        const renderViewport = page.getViewport({ scale: renderScale });
        
        els.pdfCanvas.width = renderViewport.width;
        els.pdfCanvas.height = renderViewport.height;
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, els.pdfCanvas.width, els.pdfCanvas.height);
        
        await page.render({ canvasContext: ctx, viewport: renderViewport }).promise;
      }
      
      if (token !== state.renderToken) return;
      
      els.pageWrap.style.width = width + "px";
      els.pageWrap.style.height = height + "px";
      els.overlay.setAttribute("viewBox", `0 0 ${width} ${height}`);
      els.overlay.setAttribute("width", width);
      els.overlay.setAttribute("height", height);
      
      drawOverlay();
      applyTransform();
      updateUi();
    }

    function drawOverlay() {
      state.overlayFrame = 0;
      const pageState = state.pages[state.pageIndex];
      els.overlay.innerHTML = "";
      if (!pageState) return;
      for (const obj of pageState.objects) {
        if (obj.deleted) continue;
        const isSelected = state.selected.has(obj.id);
        const node = drawGenericObject(obj, isSelected);
        node.classList.add("obj", "selectable");
        node.dataset.id = obj.id;
        els.overlay.appendChild(node);
      }
      for (const obj of pageState.overlays || []) {
        const isSelected = state.selected.has(obj.id);
        const node = drawGenericObject(obj, isSelected);
        node.classList.add("obj", "selectable");
        node.dataset.id = obj.id;
        els.overlay.appendChild(node);
      }
      drawSelectionBounds();
    }

    function scheduleDrawOverlay() {
      if (state.overlayFrame) return;
      state.overlayFrame = requestAnimationFrame(drawOverlay);
    }

    function drawGenericObject(obj, isSelected) {
      const b = boundsOf(obj);
      return svg("rect", { 
        x: b.x, y: b.y, width: Math.max(0.2, b.w), height: Math.max(0.2, b.h), 
        fill: "rgba(0,0,0,0.01)", 
        stroke: "none"
      });
    }

    function drawSelectionBounds() {
      const objs = selectedObjects();
      if (!objs.length) return;
      const b = unionBounds(objs.map(o => boundsOf(o)));
      
      const minUiSize = 24 / state.zoom;
      const uiW = Math.max(b.w, minUiSize);
      const uiH = Math.max(b.h, minUiSize);
      const uiX = b.x + (b.w - uiW) / 2;
      const uiY = b.y + (b.h - uiH) / 2;
      
      els.overlay.appendChild(svg("rect", { class: "bbox", x: uiX, y: uiY, width: uiW, height: uiH }));
      
      const s = 8 / state.zoom; 
      
      const pts = [
        [uiX, uiY, "nw", "nwse-resize"], [uiX + uiW / 2, uiY, "n", "ns-resize"], [uiX + uiW, uiY, "ne", "nesw-resize"],
        [uiX, uiY + uiH / 2, "w", "ew-resize"], [uiX + uiW, uiY + uiH / 2, "e", "ew-resize"],
        [uiX, uiY + uiH, "sw", "nesw-resize"], [uiX + uiW / 2, uiY + uiH, "s", "ns-resize"], [uiX + uiW, uiY + uiH, "se", "nwse-resize"]
      ];
      for (const [x, y, h, cursor] of pts) {
        const node = svg("rect", { class: "handle", x: x - s / 2, y: y - s / 2, width: s, height: s });
        node.dataset.handle = h;
        node.style.cursor = cursor;
        els.overlay.appendChild(node);
      }
    }

    function svg(tag, attrs) {
      const n = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
      return n;
    }

    function boundsOf(obj, original = false) {
      const dx = original ? 0 : obj.dx || 0;
      const dy = original ? 0 : obj.dy || 0;
      const sx = original ? 1 : obj.sx || 1;
      const sy = original ? 1 : obj.sy || 1;
      return {
        x: obj.x + dx, y: obj.y + dy,
        w: Math.max(.2, obj.w * sx), h: Math.max(.2, obj.h * sy)
      };
    }

    function unionBounds(list) {
      if (!list || !list.length) return {x: 0, y: 0, w: 0, h: 0};
      const x1 = Math.min(...list.map(b => b.x)), y1 = Math.min(...list.map(b => b.y));
      const x2 = Math.max(...list.map(b => b.x + b.w)), y2 = Math.max(...list.map(b => b.y + b.h));
      return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
    }

    function selectedObjects() {
      const page = state.pages[state.pageIndex];
      if (!page) return [];
      return page.objects.concat(page.overlays || []).filter(o => state.selected.has(o.id) && !o.deleted);
    }

    function findObject(id) {
      const page = state.pages[state.pageIndex];
      if (!page) return null;
      return page.objects.concat(page.overlays || []).find(o => o.id === id);
    }

    function pointerToPage(e) {
      const r = els.pageWrap.getBoundingClientRect();
      return {
        x: (e.clientX - r.left) / state.zoom,
        y: (e.clientY - r.top) / state.zoom
      };
    }

    function applyTransform() {
      els.overlay.style.setProperty('--inv-z', 1 / state.zoom);
      
      const sw = state.pageSize.width * state.zoom;
      const sh = state.pageSize.height * state.zoom;
      
      els.stage.style.width = sw + "px";
      els.stage.style.height = sh + "px";
      els.pageWrap.style.transform = `scale(${state.zoom})`;
      
      const vw = els.viewport.clientWidth;
      const vh = els.viewport.clientHeight;
      els.stage.style.marginLeft = sw < vw ? `${(vw - sw) / 2}px` : '0';
      els.stage.style.marginTop = sh < vh ? `${(vh - sh) / 2}px` : '0';

      els.zoomLabel.textContent = Math.round(state.zoom * 100) + "%";
      
      drawOverlay();

      if (Math.abs(state.zoom - state.lastRenderedZoom) > 0.05) {
        clearTimeout(state.renderTimeout);
        state.renderTimeout = setTimeout(() => {
          state.lastRenderedZoom = state.zoom;
          if (state.pdfDoc || (state.pages[state.pageIndex] && state.pages[state.pageIndex].blank)) {
            renderPage(true);
          }
        }, 400);
      }
    }

    function pdfNameString(value) {
      return value && typeof value.toString === "function" ? value.toString().replace(/^\//, "") : "";
    }

    function imageStreamInfo(imgStream, doc) {
      const getNum = (key) => {
         const val = imgStream.dict.get(PDFLib.PDFName.of(key));
         if (!val) return null;
         const resolved = doc.context.lookup(val) || val;
         if (typeof resolved.asNumber === "function") return resolved.asNumber();
         if (typeof resolved.value === "number") return resolved.value;
         if (resolved.numberValue !== undefined) return resolved.numberValue;
         return null;
      };
      const filterVal = imgStream.dict.get(PDFLib.PDFName.of("Filter"));
      const colorVal = imgStream.dict.get(PDFLib.PDFName.of("ColorSpace"));
      return {
        width: getNum("Width"),
        height: getNum("Height"),
        bits: getNum("BitsPerComponent") || 8,
        filter: pdfNameString(filterVal),
        colorSpace: pdfNameString(colorVal)
      };
    }

    async function getImageStream(obj) {
      const isolateDoc = await PDFLib.PDFDocument.load(state.pdfBytes);
      const isolatePage = isolateDoc.getPage(state.pages[state.pageIndex].sourceIndex);
      
      const xobjs = isolatePage.node.Resources().get(PDFLib.PDFName.of("XObject"));
      const imgRef = xobjs.get(PDFLib.PDFName.of(obj.name));
      return { doc: isolateDoc, page: isolatePage, stream: isolateDoc.context.lookup(imgRef) };
    }

    async function extractOriginalImageBlob(obj) {
      const { doc, stream } = await getImageStream(obj);
      const info = imageStreamInfo(stream, doc);
      const encoded = stream.contents || stream.getContents?.();
      if (!encoded) throw new Error("Image stream not readable");

      if (/DCTDecode/.test(info.filter)) {
        return new Blob([encoded], { type: "image/jpeg" });
      }
      if (/JPXDecode/.test(info.filter)) {
        return new Blob([encoded], { type: "image/jp2" });
      }
      if (/FlateDecode/.test(info.filter) && info.width && info.height && info.bits === 8) {
        const decoded = stream.getContents ? stream.getContents() : pako.inflate(encoded);
        const canvas = document.createElement("canvas");
        canvas.width = info.width;
        canvas.height = info.height;
        const ctx = canvas.getContext("2d");
        const image = ctx.createImageData(info.width, info.height);
        const comps = /DeviceGray/.test(info.colorSpace) ? 1 : (/DeviceCMYK/.test(info.colorSpace) ? 4 : 3);
        for (let i = 0, p = 0; i < image.data.length; i += 4, p += comps) {
          if (comps === 1) {
            const v = decoded[p] ?? 255;
            image.data[i] = v; image.data[i + 1] = v; image.data[i + 2] = v;
          } else if (comps === 4) {
            const c = (decoded[p] ?? 0) / 255, m = (decoded[p + 1] ?? 0) / 255, y = (decoded[p + 2] ?? 0) / 255, k = (decoded[p + 3] ?? 0) / 255;
            image.data[i] = Math.round(255 * (1 - c) * (1 - k));
            image.data[i + 1] = Math.round(255 * (1 - m) * (1 - k));
            image.data[i + 2] = Math.round(255 * (1 - y) * (1 - k));
          } else {
            image.data[i] = decoded[p] ?? 255;
            image.data[i + 1] = decoded[p + 1] ?? 255;
            image.data[i + 2] = decoded[p + 2] ?? 255;
          }
          image.data[i + 3] = 255;
        }
        ctx.putImageData(image, 0, 0);
        return await new Promise(resolve => canvas.toBlob(resolve, "image/png", 1.0));
      }
      return null;
    }

    async function extractImageBlob(obj) {
      const { doc: isolateDoc, page: isolatePage, stream: imgStream } = await getImageStream(obj);
      const info = imageStreamInfo(imgStream, isolateDoc);
      const wRaw = Number.isFinite(info.width) ? info.width : (obj.w ? obj.w * 3 : 100);
      const hRaw = Number.isFinite(info.height) ? info.height : (obj.h ? obj.h * 3 : 100);
      
      let w = Math.round(wRaw);
      let h = Math.round(hRaw);
      if (typeof w !== "number" || isNaN(w) || w <= 0) w = 100;
      if (typeof h !== "number" || isNaN(h) || h <= 0) h = 100;
      w = Number(w) || 100; // definitive fallback
      h = Number(h) || 100; // definitive fallback
      
      isolatePage.node.set(PDFLib.PDFName.of("Contents"), isolateDoc.context.flateStream(`q ${w} 0 0 ${h} 0 0 cm /${obj.name} Do Q`));
      isolatePage.setSize(w, h);
      
      const isoBytes = await isolateDoc.save();
      const pdfjsDoc = await pdfjsLib.getDocument({ data: isoBytes }).promise;
      const pdfjsPage = await pdfjsDoc.getPage(1);
      
      const vp1 = pdfjsPage.getViewport({ scale: 1 });
      let scale = w / vp1.width;
      if (!Number.isFinite(scale) || scale <= 0) scale = 1;
      const vp = pdfjsPage.getViewport({ scale });
      const cvs = document.createElement("canvas");
      cvs.width = Math.round(w); cvs.height = Math.round(h);
      await pdfjsPage.render({ canvasContext: cvs.getContext("2d"), viewport: vp }).promise;
      
      return new Promise(resolve => cvs.toBlob(resolve, "image/png", 1.0));
    }

    async function downloadOriginalImage(obj) {
      let blob = null;
      try { blob = await extractOriginalImageBlob(obj); } catch(e) {}
      if (!blob) blob = await extractImageBlob(obj);
      if (!blob) return;
      const type = blob.type || "image/png";
      const ext = type.includes("jpeg") ? "jpg" : (type.includes("jp2") ? "jp2" : "png");
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      
      const fileNameRaw = state.fileName || "imagine";
      const baseName = fileNameRaw.replace(/\.[^/.]+$/, "");
      a.download = `[${state.pageIndex + 1}] ${baseName}.${ext}`;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 1500);
    }

    async function extractImageBase64(obj) {
      const blob = await extractImageBlob(obj);
      return new Promise(resolve => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.readAsDataURL(blob);
      });
    }

    function bindEvents() {
      els.fileMenuButton.addEventListener("click", toggleFileMenu);
      
      document.addEventListener("pointerdown", (e) => { 
        if (!els.fileMenu.contains(e.target) && e.target !== els.fileMenuButton) closeFileMenu(); 
        if (e.button !== 2 && !els.contextMenu.contains(e.target)) els.contextMenu.classList.remove("open");
      });
      
      els.openMenu.addEventListener("click", () => { closeFileMenu(); els.pdfInput.click(); });
      els.exportMenu.addEventListener("click", () => { closeFileMenu(); exportPdf(); });
      els.addPageMenu.addEventListener("click", () => { closeFileMenu(); addBlankPage(); });
      els.deletePageMenu.addEventListener("click", () => { closeFileMenu(); deleteCurrentPage(); });
      els.closeMenu.addEventListener("click", () => { closeFileMenu(); closeWorkspace(); });
      
      ["dragenter", "dragover", "dragleave"].forEach(eventName => {
          window.addEventListener(eventName, e => {
              e.preventDefault();
              e.stopPropagation();
          });

        }
      });
      
      els.pdfInput.addEventListener("change", e => openPdfFile(e.target.files[0]));
      els.zoomIn.addEventListener("click", () => zoomAtCenter(1.18));
      els.zoomOut.addEventListener("click", () => zoomAtCenter(1 / 1.18));
      els.prevPage.addEventListener("click", () => goPage(state.pageIndex - 1));
      els.nextPage.addEventListener("click", () => goPage(state.pageIndex + 1));
      
      els.undoBtn.addEventListener("click", undo);
      els.redoBtn.addEventListener("click", redo);
      els.deleteSel.addEventListener("click", () => runCommand(els.deleteSel, deleteSelected));
      
      els.razorBtn.addEventListener("click", () => {
          state.razorMode = !state.razorMode;
          els.razorBtn.classList.toggle("active", state.razorMode);

      els.copySel.addEventListener("click", () => runCommand(els.copySel, async () => {

              } catch(err) {
                  console.error("Copy error:", err);
                  toast("Eroare", "Nu s-a putut copia imaginea. (" + err.message + ")", "error");
              }
          }
          await copySelected();
      }));
      
      els.pasteSel.addEventListener("click", () => runCommand(els.pasteSel, () => pasteClipboard(null)));
      
      els.toggleDpadBtn.addEventListener("click", () => {
        els.dpad.classList.toggle("open");
        els.toggleDpadBtn.classList.toggle("active");
      });
      
      const handleDpadPress = (e) => {
        const btn = e.target.closest("button[data-nudge]");
        if (!btn || btn.dataset.nudge === "0,0") return;
        e.preventDefault();
        
        const [nx, ny] = btn.dataset.nudge.split(",").map(Number);
        const step = 1 / state.zoom;
        
        nudge(nx * step, ny * step);
        
        clearTimeout(dpadInitialDelayTimeout);
        clearInterval(autoNudgeInterval);
        
        dpadInitialDelayTimeout = setTimeout(() => {
          autoNudgeInterval = setInterval(() => nudge(nx * step, ny * step), 40);
        }, 350);
      };
      
      const handleDpadRelease = () => { 
        clearTimeout(dpadInitialDelayTimeout);
        clearInterval(autoNudgeInterval); 
      };
      
      els.dpad.addEventListener("pointerdown", handleDpadPress);
      els.dpad.addEventListener("pointerup", handleDpadRelease);
      els.dpad.addEventListener("pointerleave", handleDpadRelease);

      els.viewport.addEventListener("pointerdown", onPointerDown);
      els.viewport.addEventListener("pointermove", onPointerMove);
      els.viewport.addEventListener("pointerup", onPointerUp);
      els.viewport.addEventListener("pointercancel", onPointerUp);
      els.viewport.addEventListener("wheel", onWheel, { passive: false });
      
      // Context Menu Global
      els.viewport.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        
        const pagePt = pointerToPage(e);
        state.ctxTargetPos = pagePt;
        
        const id = e.target.dataset && e.target.dataset.id;
        const isBbox = e.target.classList && e.target.classList.contains("bbox");
        
        let clickedOnSelection = false;
        
        if (isBbox && state.selected.size > 0) {
            clickedOnSelection = true;
        } else if (id) {
            if (!state.selected.has(id)) {
                state.selected.clear();
                state.selected.add(id);

            state.selected.clear();

        els.ctxPaste.style.display = hasClip ? "flex" : "none";

        const selectedImgs = selectedObjects().filter(o => o.type === "image");
        if (clickedOnSelection && selectedImgs.length === 1 && state.selected.size === 1) {

            els.ctxImgDivider.style.display = "block";
            els.ctxCopy.textContent = "Copy Image";

            state.ctxTargetImg = null;
            els.ctxExportImg.style.display = "none";
            els.ctxImgDivider.style.display = "none";
            els.ctxCopy.textContent = "Copy";
        }

        if (!clickedOnSelection && !hasClip) {
            els.contextMenu.classList.remove("open");

        els.contextMenu.style.left = e.clientX + "px";
        els.contextMenu.style.top = e.clientY + "px";
        els.contextMenu.classList.add("open");
